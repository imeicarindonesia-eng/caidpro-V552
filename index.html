<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CSID.PRO - Vehicle Intelligence</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { background-color: #000; margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes keyPop { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
        
        .animate-marquee { display: inline-block; white-space: nowrap; animation: scrollText 18s linear infinite; }
        
        /* Efek Pengetikan Warna Putih */
        .key-press-effect:active { 
            background-color: #ffffff !important; 
            color: #000000 !important; 
            animation: keyPop 0.1s ease-out;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .text-glow { text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 255, 255, 0.4); }

        .mobile-shell {
            width: 100%; max-width: 400px; height: 100%; max-height: 820px;
            background: black; position: relative; display: flex; flex-direction: column;
            overflow: hidden; 
        }

        @media (min-width: 640px) {
            .mobile-shell { border: 1px solid rgba(255,255,255,0.1); border-radius: 3.5rem; box-shadow: 0 0 50px rgba(0,0,0,1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBonuHp4nd-YZKWV5IM_2HRCfJ2TQ4zJaY",
            authDomain: "gen-lang-client-0221970857.firebaseapp.com",
            projectId: "gen-lang-client-0221970857",
            storageBucket: "gen-lang-client-0221970857.firebasestorage.app",
            messagingSenderId: "483674298302",
            appId: "1:483674298302:web:8c6ccf111af4de7bbecbef",
            measurementId: "G-KSVJJWZZVP"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        const MASTER_PIN = "280189"; 
        const ADMIN_WA = "628136900872";

        const Icons = {
            Shield: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Power: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>,
            Search: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Camera: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
            Clipboard: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>,
            ChevronLeft: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><polyline points="15 18 9 12 15 6"/></svg>,
            Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Minus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('welcome');
            const [registrationId, setRegistrationId] = useState('');
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [userRole, setUserRole] = useState(null);
            const [userExpiry, setUserExpiry] = useState(null);
            const [activePin, setActivePin] = useState('');
            const [plate, setPlate] = useState('');
            const [kbHeight, setKbHeight] = useState(22); 
            const [broadcast, setBroadcast] = useState("SELAMAT DATANG DI CSID.PRO");
            const [loading, setLoading] = useState(true);
            const [searchResult, setSearchResult] = useState(null);
            const [notification, setNotification] = useState(null);
            const [managedPins, setManagedPins] = useState([]);
            const [adminTapCount, setAdminTapCount] = useState(0);
            const [showAddPinForm, setShowAddPinForm] = useState(false);
            const [extendingPin, setExtendingPin] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                let savedId = localStorage.getItem('csid_reg_id');
                if (!savedId) {
                    savedId = Math.floor(100000 + Math.random() * 900000).toString();
                    localStorage.setItem('csid_reg_id', savedId);
                }
                setRegistrationId(savedId);

                auth.signInAnonymously().then(() => {
                    handleAutoLogin(savedId);
                }).catch(() => setLoading(false));

                const unsubBroadcast = db.collection('csid_pro').doc('settings').onSnapshot(doc => {
                    if (doc.exists) setBroadcast(doc.data().text || "SELAMAT DATANG DI CSID.PRO");
                });

                const unsubPins = db.collection('csid_pro_pins').onSnapshot(snap => {
                    const pins = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setManagedPins(pins);
                });

                return () => { unsubBroadcast(); unsubPins(); };
            }, []);

            const showMsg = (txt) => { setNotification(txt); setTimeout(() => setNotification(null), 3000); };

            const getDeviceId = () => {
                let id = localStorage.getItem('csid_device_id');
                if (!id) {
                    id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                    localStorage.setItem('csid_device_id', id);
                }
                return id;
            };

            const handleAutoLogin = async (id) => {
                const myDeviceId = getDeviceId();
                try {
                    const pinSnap = await db.collection('csid_pro_pins').doc(id).get();
                    if (pinSnap.exists) {
                        const data = pinSnap.data();
                        if (!data.isBlocked && (data.expiry === 'UNLIMITED' || Date.now() < data.expiry)) {
                            if (!data.deviceId || data.deviceId === myDeviceId) {
                                setUserRole(data.role || 'user');
                                setUserExpiry(data.expiry);
                                setActivePin(id);
                                setCurrentPage('search');
                            }
                        }
                    }
                } catch (e) {} finally { setLoading(false); }
            };

            const handleLoginOnline = async () => {
                setLoading(true);
                const myDeviceId = getDeviceId();
                try {
                    const pinSnap = await db.collection('csid_pro_pins').doc(registrationId).get();
                    if (!pinSnap.exists) throw new Error("ID BELUM DIAKTIFKAN ADMIN");
                    const data = pinSnap.data();
                    if (data.isBlocked) throw new Error("AKSES DISEKAT / DIBLOKIR");
                    if (data.expiry !== 'UNLIMITED' && Date.now() > data.expiry) throw new Error("MASA AKTIF HABIS");
                    if (data.deviceId && data.deviceId !== myDeviceId) throw new Error("ID TERIKAT DI HP LAIN");
                    if (!data.deviceId) await db.collection('csid_pro_pins').doc(registrationId).update({ deviceId: myDeviceId });
                    setUserRole('user'); setUserExpiry(data.expiry); setActivePin(registrationId); setCurrentPage('search');
                } catch (e) { showMsg(e.message); } finally { setLoading(false); }
            };

            const handleMasterLogin = () => {
                if (pinInput === MASTER_PIN) {
                    setUserRole('master'); setUserExpiry('UNLIMITED'); setActivePin('MASTER');
                    setCurrentPage('search'); setShowPinModal(false); setPinInput('');
                } else { showMsg("PIN SALAH"); setPinInput(''); }
            };

            const fetchData = async () => {
                const targetPlate = plate.replace(/\s/g, '').toUpperCase();
                if (!targetPlate) { showMsg("KETIK PLAT NOMOR"); return; }
                setLoading(true);
                const url = `http://202.155.143.156/tnkb_api_key.php?q=${targetPlate}&apikey=KORLANTAS_250588ReALtimE`;
                const proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
                try {
                    const res = await fetch(proxy);
                    const json = await res.json();
                    if (json && !json.error && Object.keys(json).length > 0) { 
                        setSearchResult(json); 
                        setCurrentPage('result'); 
                    }
                    else { showMsg("DATA TIDAK DITEMUKAN"); }
                } catch (e) { showMsg("SERVER SIBUK / ERROR"); } finally { setLoading(false); }
            };

            const getVal = (cat) => {
                if (!searchResult) return "-";
                const keys = {
                    Nama: ['NamaPemilik', 'nama', 'nm_pmlk'], NIK: ['NoKTP', 'nik', 'no_ktp'], HP: ['NoHP', 'msisdn', 'phone'],
                    Alamat: ['AlamatPemilik', 'alamat', 'almt_pmlk'], Merk: ['Merk', 'merk', 'merek'], Tipe: ['Type', 'type', 'tipe'],
                    Tahun: ['TahunPembuatan', 'tahun', 'thn_buat'], Warna: ['Warna', 'warna'], CC: ['IsiCylinder', 'cc', 'isi_silinder'],
                    BBM: ['BBM', 'bahan_bakar'], Noka: ['NoRangka', 'noka', 'vin'], Nosin: ['NoMesin', 'nosin', 'no_mesin'],
                    BPKB: ['NoBPKB', 'bpkb'], STNK: ['NoSTNK', 'stnk'], Tgl: ['TanggalDaftar', 'tgl_daftar', 'tgl_registrasi'],
                    NopolServer: ['NoPolisi', 'nopol', 'no_pol', 'nomor_polisi', 'tnkb'],
                    Wilayah: ['Wilayah', 'kode_wilayah', 'kd_wilayah'],
                    Seri: ['Seri', 'seri_akhir', 'kd_seri']
                };
                const find = (obj, aliases) => {
                    if(!obj) return null;
                    for (let a of aliases) {
                        const k = Object.keys(obj).find(key => key.toLowerCase() === a.toLowerCase());
                        if (k && obj[k]) return obj[k];
                    }
                    for (let k in obj) if (typeof obj[k] === 'object' && obj[k]) {
                        const res = find(obj[k], aliases); if (res) return res;
                    }
                    return null;
                };
                return find(searchResult, keys[cat] || [cat]) || "-";
            };

            const formatExpiry = (exp) => {
                if (exp === 'UNLIMITED') return 'NOLIMIT';
                const diff = exp - Date.now();
                if (diff <= 0) return 'EXPIRED';
                const days = Math.floor(diff / 86400000);
                const hours = Math.floor((diff % 86400000) / 3600000);
                return days > 0 ? `${days}H ${hours}J` : `${hours}J`;
            };

            const renderWelcome = () => (
                <div className="flex-1 flex flex-col items-center justify-between py-6 px-8 bg-black text-white h-full relative overflow-hidden">
                    <div className="text-center mt-4">
                        <p className="text-[19px] font-black tracking-tight leading-tight uppercase">
                            SELAMAT DATANG DI APLIKASI<br/>
                            CEK SAMSAT RANMOR<br/>
                            INDONESIA
                        </p>
                    </div>

                    <h1 
                        onClick={() => { const c = adminTapCount+1; setAdminTapCount(c); if(c===5){ setShowPinModal(true); setAdminTapCount(0); } }} 
                        className="text-[64px] font-black tracking-tighter cursor-pointer transition-all active:scale-95 text-white text-glow"
                    >
                        CSID.PRO
                    </h1>

                    <div className="w-full flex flex-col items-center gap-6 mb-12">
                        <div className="w-full max-w-[340px] border border-white rounded-[2.5rem] py-4 px-8 text-center">
                            <p className="text-[10px] font-black uppercase tracking-widest mb-2 opacity-80">ID Pendaftaran Anda :</p>
                            <p className="text-[62px] font-black tracking-widest leading-none">{registrationId}</p>
                        </div>

                        <div className="w-full space-y-4 max-w-[340px] pt-2">
                            <button 
                                onClick={handleLoginOnline} 
                                className="w-full bg-white text-black py-5 rounded-full font-black flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl text-lg uppercase"
                            >
                                <Icons.Shield cls="w-5 h-5" /> LOGIN ONLINE
                            </button>

                            <button 
                                onClick={() => window.open(`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(`Halo Admin CSID.PRO mohon aktivasi ID pendaftaran saya: ${registrationId}`)}`)} 
                                className="w-full bg-[#108a6e] text-white py-5 rounded-full font-black flex items-center justify-center gap-3 active:scale-95 shadow-2xl text-lg uppercase"
                            >
                                DAFTAR VIA WHATSAPP
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderSearch = () => (
                <div className="flex-1 flex flex-col h-full bg-black">
                    <header className="px-5 py-4 flex items-center justify-between border-b border-white/5 shrink-0 bg-black z-50">
                        <div className="flex items-center gap-2 text-white"><Icons.Shield /> <span className="font-black tracking-tighter text-xl">CSID.PRO</span></div>
                        <div className="text-right">
                            <p className="text-[10px] font-black uppercase text-[#f97316]">PIN : {userRole === 'master' ? 'MASTER' : activePin}</p>
                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-tighter">SISA : {formatExpiry(userExpiry)}</p>
                        </div>
                    </header>
                    <div className="h-8 bg-black overflow-hidden flex items-center border border-[#f97316] shrink-0 mx-2 mt-1 rounded-sm">
                        <div className="animate-marquee px-4 text-[10px] font-black text-white uppercase tracking-widest">{broadcast}</div>
                    </div>
                    <main className="flex-1 flex flex-col p-4 bg-black overflow-hidden relative">
                        <div className="w-full h-20 border-2 border-[#f97316] rounded-sm bg-black flex items-center justify-center px-6 mb-2 mt-2 overflow-hidden shadow-[0_0_15px_rgba(249,115,22,0.3)]">
                             <input type="text" inputMode="none" value={plate} onChange={(e) => setPlate(e.target.value.toUpperCase().replace(/\s/g,''))} className={`bg-transparent w-full text-center outline-none font-black tracking-[0.2em] uppercase transition-all placeholder:text-slate-700 ${plate.length > 8 ? 'text-xl' : 'text-3xl'} text-white`} />
                        </div>
                        <div className="flex-1 flex flex-col items-center justify-center py-2 h-16 mt-4">
                             <p className="text-white text-[16px] font-black text-center uppercase tracking-tight mb-1">PERINGATAN ⚠️</p>
                             <p className="text-white text-[11px] font-black text-center uppercase tracking-tight leading-tight opacity-90">DILARANG KERAS MENYALAHGUNAKAN APLIKASI INI<br/>TANPA IZIN RESMI CSID.PRO</p>
                        </div>
                        <div className="mt-auto px-0">
                             <div className={`grid ${userRole === 'master' ? 'grid-cols-7' : 'grid-cols-6'} gap-[2px] mb-[2px]`}>
                                <button onClick={() => setKbHeight(h => Math.max(14, h-2))} className="bg-[#e2ff00] h-14 flex items-center justify-center rounded-none key-press-effect text-black font-black"><Icons.Minus /></button>
                                <button onClick={() => setKbHeight(h => Math.min(32, h+2))} className="bg-[#e2ff00] h-14 flex items-center justify-center rounded-none key-press-effect text-black font-black"><Icons.Plus /></button>
                                <button className="bg-[#e2ff00] h-14 flex items-center justify-center rounded-none key-press-effect text-black font-black"><Icons.Camera /></button>
                                <button onClick={async () => { try { const t = await navigator.clipboard.readText(); setPlate(t.toUpperCase().replace(/\s/g, '')); } catch(e){} }} className="bg-[#e2ff00] h-14 flex items-center justify-center rounded-none key-press-effect text-black font-black"><Icons.Clipboard /></button>
                                {userRole === 'master' && <button onClick={() => setCurrentPage('admin')} className="bg-[#dc2626] h-14 flex items-center justify-center rounded-none key-press-effect text-white font-black"><Icons.Shield /></button>}
                                <button onClick={() => { localStorage.removeItem('csid_saved_pin'); setCurrentPage('welcome'); }} className="bg-[#dc2626] h-14 flex items-center justify-center rounded-none key-press-effect text-white font-black"><Icons.Power /></button>
                                <button onClick={fetchData} className="bg-[#f97316] h-14 flex items-center justify-center rounded-none key-press-effect text-white font-black"><Icons.Search /></button>
                             </div>
                             
                             <div className="flex flex-col gap-[2px] pb-4">
                                <div className="grid grid-cols-5 gap-[2px]">
                                   {['1','2','3'].map(n => <button key={n} onClick={() => setPlate(p => p+n)} style={{height: `${kbHeight * 3}px`}} className="bg-[#2e3b4e] text-white rounded-none text-4xl font-black key-press-effect">{n}</button>)}
                                   <button key="DEL" onClick={() => setPlate(p => p.slice(0,-1))} style={{height: `${kbHeight * 3}px`}} className="bg-[#f97316] text-black rounded-none font-black text-2xl key-press-effect">DEL</button>
                                   <button key="CLR" onClick={() => setPlate('')} style={{height: `${kbHeight * 3}px`}} className="bg-[#f97316] text-black rounded-none font-black text-2xl key-press-effect">CLR</button>
                                </div>
                                <div className="grid grid-cols-4 gap-[2px]">
                                   {['4','5','6','0'].map(n => <button key={n} onClick={() => setPlate(p => p+n)} style={{height: `${kbHeight * 3}px`}} className="bg-[#2e3b4e] text-white rounded-none text-4xl font-black key-press-effect">{n}</button>)}
                                </div>
                                <div className="grid grid-cols-3 gap-[2px]">
                                   {['7','8','9'].map(n => <button key={n} onClick={() => setPlate(p => p+n)} style={{height: `${kbHeight * 3}px`}} className="bg-[#2e3b4e] text-white rounded-none text-4xl font-black key-press-effect">{n}</button>)}
                                </div>
                                <div className="flex flex-col gap-[2px]">
                                  {[ ['Q','W','E','R','T','Y','U','I','O','P'], ['A','S','D','F','G','H','J','K','L'], ['Z','X','C','V','B','N','M'] ].map((row, i) => (
                                    <div key={i} className="flex gap-[2px]">
                                      {row.map(char => (
                                        <button key={char} onClick={() => setPlate(p => p+char)} style={{height: `${kbHeight * 2.8}px`}} className="flex-1 bg-[#2e3b4e] text-white rounded-none text-xl font-black key-press-effect">{char}</button>
                                      ))}
                                    </div>
                                  ))}
                                </div>
                             </div>
                        </div>
                    </main>
                </div>
            );

            const renderAdmin = () => {
                const durOpts = [ { label: '1 JAM', ms: 3600000 }, { label: '1 HARI', ms: 86400000 }, ...Array.from({length: 30}, (_, i) => ({ label: `${i+2} HARI`, ms: (i+2) * 86400000 })), { label: 'UNLIMITED', ms: 'UNLIMITED' } ];
                const filtered = managedPins.filter(p => p.id.toLowerCase().includes(searchTerm.toLowerCase()));
                return (
                    <div className="flex-1 flex flex-col h-full bg-[#050505] overflow-hidden">
                        <header className="px-5 py-5 flex items-center justify-between border-b border-white/5 shrink-0 bg-black z-[100]">
                            <button onClick={() => setCurrentPage('search')} className="key-press-effect p-2 bg-slate-900 rounded-full text-white"><Icons.ChevronLeft /></button>
                            <span className="text-white font-black tracking-tighter text-xl uppercase">Master Control</span>
                            <div className="w-6" />
                        </header>
                        
                        <div className="flex-1 overflow-y-auto scrollbar-hide px-4 py-6 space-y-6">
                            <div className="grid grid-cols-3 gap-2">
                                <div className="bg-[#121212] p-4 rounded-3xl text-center border border-white/5 shadow-inner">
                                    <p className="text-2xl font-black text-blue-400">{managedPins.length}</p>
                                    <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mt-1">Agen</p>
                                </div>
                                <div className="bg-[#121212] p-4 rounded-3xl text-center border border-white/5 shadow-inner">
                                    <p className="text-2xl font-black text-emerald-400">{managedPins.filter(p => !p.isBlocked).length}</p>
                                    <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mt-1">Aktif</p>
                                </div>
                                <div className="bg-[#121212] p-4 rounded-3xl text-center border border-white/5 shadow-inner">
                                    <p className="text-2xl font-black text-orange-400">ONLINE</p>
                                    <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mt-1">Server</p>
                                </div>
                            </div>

                            <div className="bg-[#121212] p-6 rounded-[2.5rem] border border-white/5">
                                <p className="text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-widest text-white opacity-60">Update Broadcast (24J Real-time)</p>
                                <textarea value={broadcast} spellCheck="false" onChange={e => setBroadcast(e.target.value)} className="w-full bg-black border border-white/10 rounded-2xl p-4 text-xs text-white outline-none h-24 mb-4" />
                                <button onClick={async () => { await db.collection('csid_pro').doc('settings').set({ text: broadcast }); showMsg("UPDATE BERHASIL"); }} className="w-full bg-[#f97316] text-white py-4 rounded-2xl font-black text-xs uppercase key-press-effect tracking-widest">Update Pesan</button>
                            </div>

                            <div className="flex gap-2">
                                <input type="text" placeholder="CARI ID PIN..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="flex-1 bg-[#121212] border border-white/10 rounded-2xl px-5 py-4 text-xs text-white outline-none font-bold" />
                                <button onClick={() => setShowAddPinForm(true)} className="bg-emerald-600 text-white px-6 rounded-2xl shadow-lg key-press-effect"><Icons.Plus /></button>
                            </div>

                            <div className="space-y-4 pb-12">
                                {filtered.map(p => (
                                    <div key={p.id} className="bg-[#121212] p-5 rounded-[2.5rem] border border-white/5 shadow-xl relative overflow-hidden text-white">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <p className="text-3xl font-black text-[#f97316] tracking-[0.2em]">{p.id}</p>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase mb-1">EXP: {p.expiry === 'UNLIMITED' ? 'NOLIMIT' : new Date(p.expiry).toLocaleDateString()}</p>
                                                <p className="text-[8px] text-slate-600 font-black">HP: {p.deviceId || 'BELUM TERIKAT'}</p>
                                            </div>
                                            <span className={`px-3 py-1 rounded-full text-[9px] font-black uppercase ${p.isBlocked ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white'}`}>{p.isBlocked ? 'SEKAT' : 'AKTIF'}</span>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2">
                                            <button onClick={async () => await db.collection('csid_pro_pins').doc(p.id).update({ isBlocked: !p.isBlocked })} className="bg-orange-500 text-white py-4 rounded-2xl text-[9px] font-black uppercase key-press-effect">SEKAT</button>
                                            <button onClick={() => setExtendingPin(p)} className="bg-emerald-500 text-white py-4 rounded-2xl text-[9px] font-black uppercase key-press-effect">DURASI</button>
                                            <button onClick={async () => { await db.collection('csid_pro_pins').doc(p.id).update({ deviceId: null }); showMsg("HP DIRESET"); }} className="bg-blue-600 text-white py-4 rounded-2xl text-[9px] font-black uppercase key-press-effect">RESET HP</button>
                                        </div>
                                        <button onClick={async () => { if(confirm("Hapus PIN?")) await db.collection('csid_pro_pins').doc(p.id).delete(); }} className="w-full mt-2 bg-red-600/10 text-red-600 py-4 rounded-2xl text-[9px] font-black uppercase flex items-center justify-center gap-2">
                                            <Icons.Trash /> HAPUS PIN PERMANEN
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {showAddPinForm && (
                            <div className="absolute inset-0 bg-black/95 z-[500] flex items-center justify-center p-6 backdrop-blur-xl">
                                <div className="bg-[#121212] w-full max-w-[320px] rounded-[3rem] p-8 border border-white/10 text-center shadow-2xl">
                                    <h3 className="text-white font-black text-xs uppercase mb-8 tracking-widest">Daftar PIN Baru</h3>
                                    <input id="new_pin_id" type="text" maxLength={6} placeholder="6-DIGIT PIN" className="w-full bg-black border border-white/10 p-5 rounded-2xl text-center text-2xl font-black text-white mb-4 outline-none" />
                                    <select id="new_pin_dur" className="w-full bg-black border border-white/10 p-4 rounded-xl text-xs text-white mb-6 uppercase font-bold outline-none">{durOpts.map(d => <option key={d.label} value={d.ms}>{d.label}</option>)}</select>
                                    <div className="flex gap-3">
                                        <button onClick={() => setShowAddPinForm(false)} className="flex-1 bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase">Batal</button>
                                        <button onClick={async () => { 
                                            const id = document.getElementById('new_pin_id').value; 
                                            const dur = document.getElementById('new_pin_dur').value; 
                                            if(id.length < 4) return; 
                                            const exp = dur === 'UNLIMITED' ? 'UNLIMITED' : Date.now() + parseInt(dur); 
                                            await db.collection('csid_pro_pins').doc(id).set({ expiry: exp, role: 'user', isBlocked: false, deviceId: null }); 
                                            setShowAddPinForm(false); showMsg("PIN AKTIF"); 
                                        }} className="flex-1 bg-emerald-600 text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg">Aktifkan</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        {extendingPin && (
                            <div className="absolute inset-0 bg-black/95 z-[500] flex items-center justify-center p-6 backdrop-blur-xl">
                                <div className="bg-[#121212] w-full max-w-[320px] rounded-[3rem] p-8 border border-white/10 text-center shadow-2xl">
                                    <h3 className="text-white font-black text-xs uppercase mb-8 tracking-widest">Tambah Masa Aktif</h3>
                                    <select id="ext_pin_dur" className="w-full bg-black border border-white/10 p-4 rounded-xl text-xs text-white mb-6 uppercase font-bold outline-none">{durOpts.map(d => <option key={d.label} value={d.ms}>{d.label}</option>)}</select>
                                    <div className="flex gap-3">
                                        <button onClick={() => setExtendingPin(null)} className="flex-1 bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase">Batal</button>
                                        <button onClick={async () => { 
                                            const dur = document.getElementById('ext_pin_dur').value; 
                                            const base = Math.max(extendingPin.expiry === 'UNLIMITED' ? Date.now() : (extendingPin.expiry || Date.now()), Date.now()); 
                                            const exp = dur === 'UNLIMITED' ? 'UNLIMITED' : base + parseInt(dur); 
                                            await db.collection('csid_pro_pins').doc(extendingPin.id).update({ expiry: exp }); 
                                            setExtendingPin(null); showMsg("DURASI DIPERPANJANG"); 
                                        }} className="flex-1 bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg">Proses</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderResult = () => {
                const constructPlate = () => {
                    const svPlate = getVal('NopolServer');
                    const wilayah = getVal('Wilayah');
                    const seri = getVal('Seri');
                    if (wilayah !== "-" && svPlate !== "-" && svPlate !== "" && /^\d+$/.test(svPlate.replace(/\s/g, ''))) {
                        return (wilayah + svPlate + (seri !== "-" ? seri : "")).replace(/\s/g, '').toUpperCase();
                    }
                    return svPlate !== "-" && svPlate !== "" ? svPlate.replace(/\s/g, '').toUpperCase() : plate.toUpperCase();
                };

                const finalPlate = constructPlate();
                const reportText = `🇲🇨 SUMBER : APLIKASI CSID.PRO

🚻 IDENTITAS PEMILIK :
----------------------------------------
NAMA : ${getVal('Nama')}
NIK : ${getVal('NIK')}
MSSDN : ${getVal('HP')}
ALAMAT : ${getVal('Alamat')}

🚘 DATA KENDARAAN :
----------------------------------------
NOPOL : ${finalPlate}
MEREK : ${getVal('Merk')}
TYPE : ${getVal('Tipe')}
TAHUN : ${getVal('Tahun')}
WARNA : ${getVal('Warna')}
CYLINDER : ${getVal('CC')}
JENIS BBM : ${getVal('BBM')}

📙 DOKUMEN RESMI :
----------------------------------------
NOKA : ${getVal('Noka')}
NOSIN : ${getVal('Nosin')}
NO. BPKB : ${getVal('BPKB')}
NO. STNK : ${getVal('STNK')}
TGL DAFTAR : ${getVal('Tgl')}
----------------------------------------
🔊 LINK DAFTAR APLIKASI : CSID.PRO
📞 Hub: https://wa.me/628136900872

✍️ NOTE :
DATA DIAKSES UNTUK MEMVERIFIKASI KEPEMILIKAN KENDARAAN YANG SAH SESUAI TNKB YANG BERLAKU PADA KENDARAAN. MENURUT UU YANG BERLAKU ⚖️`;

                return (
                    <div className="flex-1 flex flex-col h-full bg-black overflow-hidden">
                        <header className="px-5 py-5 flex items-center justify-between border-b border-white/5 shrink-0 bg-black z-10">
                            <button onClick={() => setCurrentPage('search')} className="key-press-effect p-2 bg-slate-900 rounded-full text-white"><Icons.ChevronLeft /></button>
                            <span className="text-white font-black tracking-tighter text-lg uppercase">Hasil Resmi</span>
                            <div className="w-6" />
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 bg-black pb-32 scrollbar-hide">
                            <div className="bg-[#0f0f0f] border border-white/10 rounded-3xl p-6 font-mono text-[11px] text-white leading-relaxed whitespace-pre shadow-2xl overflow-x-auto select-text">
                                {reportText}
                            </div>
                            <div className="mt-6 space-y-4">
                                <button onClick={() => { 
                                    const el = document.createElement('textarea');
                                    el.value = reportText;
                                    document.body.appendChild(el);
                                    el.select();
                                    document.execCommand('copy');
                                    document.body.removeChild(el);
                                    showMsg("LAPORAN DISALIN"); 
                                }} className="w-full bg-[#f97316] text-white py-6 rounded-[2.5rem] font-black flex items-center justify-center gap-3 key-press-effect text-lg shadow-xl shadow-orange-900/20">SALIN LAPORAN</button>
                                <button onClick={() => window.open(`https://wa.me/?text=${encodeURIComponent(reportText)}`)} className="w-full bg-emerald-600 text-white py-6 rounded-[2.5rem] font-black flex items-center justify-center gap-3 key-press-effect text-lg shadow-xl shadow-emerald-900/20">KIRIM KE WHATSAPP</button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="mobile-shell">
                    {currentPage === 'welcome' && renderWelcome()}
                    {currentPage === 'search' && renderSearch()}
                    {currentPage === 'admin' && renderAdmin()}
                    {currentPage === 'result' && renderResult()}

                    {showPinModal && (
                        <div className="absolute inset-0 bg-black/95 backdrop-blur-xl z-[200] flex items-center justify-center p-6">
                            <div className="bg-[#121212] w-full max-w-[320px] rounded-[3rem] border border-white/10 p-8 shadow-2xl text-center">
                                <h3 className="text-white font-black text-xs tracking-widest uppercase mb-10 opacity-70">Akses Master Admin</h3>
                                <input autoFocus type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleMasterLogin()} placeholder="PIN MASTER" className="w-full bg-black border border-white/10 rounded-2xl p-5 text-center text-2xl font-black text-white tracking-[0.6em] outline-none mb-8" />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowPinModal(false)} className="flex-1 py-4 bg-slate-900 text-white rounded-xl font-black text-[10px] uppercase tracking-widest">Batal</button>
                                    <button onClick={handleMasterLogin} className="flex-1 py-4 bg-white text-black rounded-xl font-black text-[10px] uppercase tracking-widest">Masuk</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[3000] bg-[#f97316] text-white px-8 py-4 rounded-full font-black text-xs shadow-2xl animate-bounce tracking-widest uppercase border-2 border-white/20">
                            {notification}
                        </div>
                    )}

                    {loading && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-[3000] flex items-center justify-center">
                            <div className="flex flex-col items-center">
                                <div className="w-16 h-16 border-4 border-white/20 border-t-[#f97316] rounded-full animate-spin mb-4" />
                                <p className="text-white font-black uppercase text-[10px] tracking-[0.3em]">Memproses Data...</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
