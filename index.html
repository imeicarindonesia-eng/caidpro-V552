<body>
    <div id="root" class="w-full h-full flex items-center justify-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MASTER_PIN = "280189"; 
        const ADMIN_WA = "628136900872";
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'csid-intelligence';
        
       
// CONFIGURASI API (Hanya satu API)
const API_UTAMA_URL = "https://api.dataroda.my.id/naga.php?key=DR-EA7B642ECEB38CFD73F8F70C&q=";

        const firebaseConfig = {
            apiKey: "AIzaSyBonuHp4nd-YZKWV5IM_2HRCfJ2TQ4zJaY",
            authDomain: "gen-lang-client-0221970857.firebaseapp.com",
            projectId: "gen-lang-client-0221970857",
            storageBucket: "gen-lang-client-0221970857.firebasestorage.app",
            messagingSenderId: "483674298302",
            appId: "1:483674298302:web:8c6ccf111af4de7bbecbef"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const Icons = {
            Shield: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Power: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>,
            Search: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Camera: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
            Paste: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
            ChevronLeft: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><polyline points="15 18 9 12 15 6"/></svg>,
            Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Minus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('welcome');
            const [registrationId, setRegistrationId] = useState('');
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [userRole, setUserRole] = useState(null);
            const [userExpiry, setUserExpiry] = useState(null);
            const [activePin, setActivePin] = useState('');
            const [plate, setPlate] = useState('');
            const [kbHeight, setKbHeight] = useState(24); 
            const [broadcast, setBroadcast] = useState("SELAMAT DATANG DI CSID.PRO - VEHICLE INTELLIGENCE SYSTEM");
            const [loading, setLoading] = useState(true);
            const [searchResult, setSearchResult] = useState(null);
            const [notification, setNotification] = useState(null);
            const [managedPins, setManagedPins] = useState([]);
            const [adminTapCount, setAdminTapCount] = useState(0);
            const [searchTerm, setSearchTerm] = useState('');
            const [durationModal, setDurationModal] = useState(null);
            const [showAddPinModal, setShowAddPinModal] = useState(false);
            const [newPinInput, setNewPinInput] = useState('');
            const [newPinDuration, setNewPinDuration] = useState(86400000); 
            const [confirmModal, setConfirmModal] = useState(null); // Modal Konfirmasi Kustom
            const inputRef = useRef(null);

            const getDeviceId = () => {
                let id = localStorage.getItem('csid_device_token');
                if (!id) {
                    id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                    localStorage.setItem('csid_device_token', id);
                }
                return id;
            };

            const paths = {
                pins: `artifacts/${APP_ID}/public/data/csid_pro_pins`,
                settings: `artifacts/${APP_ID}/public/data/csid_pro_settings`
            };

            const durationOptions = [
                {l: '1 JAM', v: 3600000},
                ...Array.from({length: 31}, (_, i) => ({l: `${i+1} HARI`, v: 86400000 * (i+1)})),
                {l: 'PERMANEN', v: 'UNLIMITED'}
            ];

            const formatExpiry = (exp) => {
                if (exp === 'UNLIMITED') return 'NOLIMIT';
                if (!exp) return 'EXPIRED';
                const diff = exp - Date.now();
                if (diff <= 0) return 'EXPIRED';
                const days = Math.floor(diff / 86400000);
                const hours = Math.floor((diff % 86400000) / 3600000);
                return days > 0 ? `${days}H ${hours}J` : `${hours}J`;
            };

            const showMsg = (txt) => { setNotification(txt); setTimeout(() => setNotification(null), 3000); };

            useEffect(() => {
                let savedId = localStorage.getItem('csid_reg_id');
                if (!savedId) {
                    savedId = Math.floor(100000 + Math.random() * 900000).toString();
                    localStorage.setItem('csid_reg_id', savedId);
                }
                setRegistrationId(savedId);

                const initAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                        handleAutoLogin(savedId);
                        
                        db.doc(paths.settings + '/main').onSnapshot(doc => {
                            if (doc.exists) setBroadcast(doc.data().text || broadcast);
                        });
                        
                        db.collection(paths.pins).onSnapshot(snap => {
                            const pins = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            setManagedPins(pins);
                        }, err => console.error(err));

                    } catch (e) { console.error(e); setLoading(false); }
                };
                initAuth();
            }, []);

            const handleAutoLogin = async (id) => {
                try {
                    const pinSnap = await db.doc(`${paths.pins}/${id}`).get();
                    if (pinSnap.exists) {
                        const data = pinSnap.data();
                        const currentDeviceId = getDeviceId();
                        if (data.isBlocked || (data.expiry !== 'UNLIMITED' && Date.now() > data.expiry)) return;
                        if (data.deviceId && data.deviceId !== currentDeviceId) return;

                        setUserRole(data.role || 'user');
                        setUserExpiry(data.expiry);
                        setActivePin(id);
                        setCurrentPage('search');
                    }
                } catch (e) { console.error(e); } finally { setLoading(false); }
            };

            const handleLoginOnline = async () => {
                setLoading(true);
                try {
                    const pinSnap = await db.doc(`${paths.pins}/${registrationId}`).get();
                    if (!pinSnap.exists) throw new Error("ID BELUM DIAKTIFKAN ADMIN");
                    
                    const data = pinSnap.data();
                    const currentDeviceId = getDeviceId();

                    if (data.isBlocked) throw new Error("AKSES DIBLOKIR");
                    if (data.expiry !== 'UNLIMITED' && Date.now() > data.expiry) throw new Error("MASA AKTIF HABIS");
                    if (data.deviceId && data.deviceId !== currentDeviceId) throw new Error("PIN TERDAFTAR DI HP LAIN");

                    if (!data.deviceId) await db.doc(`${paths.pins}/${registrationId}`).update({ deviceId: currentDeviceId });
                    
                    setUserRole('user'); setUserExpiry(data.expiry); setActivePin(registrationId); setCurrentPage('search');
                } catch (e) { showMsg(e.message); } finally { setLoading(false); }
            };

            const handleMasterLogin = () => {
                if (pinInput === MASTER_PIN) {
                    setUserRole('master'); setUserExpiry('UNLIMITED'); setActivePin('MASTER');
                    setCurrentPage('search'); setShowPinModal(false); setPinInput('');
                } else { showMsg("PIN SALAH"); setPinInput(''); }
            };

            // LOGIKA CONCURRENT RACING MAKSIMAL: MENEMBAK SEMUA JALUR (DIRECT & PROXY) SEKALIGUS UNTUK SETIAP ENDPOINT
            // Sistem ini menghilangkan delay nunggu timeout 2 detik jika direct fetch gagal!
            const fetchData = async () => {
                const targetPlate = plate.replace(/\s/g, '').toUpperCase();
                if (!targetPlate) { showMsg("MASUKKAN PLAT NOMOR"); return; }
                setLoading(true);
                
                const proxy = `https://api.codetabs.com/v1/proxy?quest=`;
                const isWebBrowser = window.location.protocol.startsWith('http') && 
                                     !window.location.hostname.includes('localhost') && 
                                     !window.location.hostname.includes('127.0.0.1');

                const fetchWithTimeout = async (url, timeoutMs = 2500) => {
                    let timeoutId;
                    const timeoutPromise = new Promise((_, reject) => {
                        timeoutId = setTimeout(() => reject(new Error('Timeout')), timeoutMs);
                    });
                    
                    return Promise.race([
                        fetch(url).then(res => {
                            clearTimeout(timeoutId);
                            return res;
                        }),
                        timeoutPromise
                    ]);
                };

                const urlUtama = `${API_UTAMA_URL}?q=${targetPlate}`;
                const urlCadangan = `${API_CADANGAN_URL}&q=${targetPlate}`;

                // Skenario Racing: Tembak semua kemungkinan koneksi sekaligus!
                const candidates = [];
                if (isWebBrowser) {
                    // Di browser, direct fetch pasti gagal karena CORS. Cukup tembak jalur proxy
                    candidates.push({ url: proxy + encodeURIComponent(urlUtama), name: "Utama Proxy" });
                    candidates.push({ url: proxy + encodeURIComponent(urlCadangan), name: "Cadangan Proxy" });
                } else {
                    // Di APK/WebView, tembak direct dan proxy secara bersamaan (Parallel Concurrent Racing)
                    // Mana yang baliknya paling cepat (<100ms untuk direct sukses), itu yang menang!
                    candidates.push({ url: urlUtama, name: "Utama Direct" });
                    candidates.push({ url: urlCadangan, name: "Cadangan Direct" });
                    candidates.push({ url: proxy + encodeURIComponent(urlUtama), name: "Utama Proxy" });
                    candidates.push({ url: proxy + encodeURIComponent(urlCadangan), name: "Cadangan Proxy" });
                }

                // Custom Promise.any yang kompatibel dengan semua versi WebView lama
                const raceSuccessful = (promises) => {
                    return new Promise((resolve, reject) => {
                        let rejectedCount = 0;
                        let resolved = false;
                        if (promises.length === 0) reject(new Error("No paths available"));
                        promises.forEach((p) => {
                            Promise.resolve(p)
                                .then(val => {
                                    if (!resolved) {
                                        resolved = true;
                                        resolve(val);
                                    }
                                })
                                .catch((err) => {
                                    rejectedCount++;
                                    if (rejectedCount === promises.length && !resolved) {
                                        reject(new Error("Semua jalur API gagal"));
                                    }
                                });
                        });
                    });
                };

                // Bungkus setiap kandidat ke dalam racing promise
                const racingPromises = candidates.map((c) => {
                    return new Promise(async (resolve, reject) => {
                        try {
                            const res = await fetchWithTimeout(c.url, 4000);
                            const json = await res.json();
                            if (json && !json.error && Object.keys(json).length > 0) { 
                                resolve(json);
                            } else {
                                reject(new Error(`Data kosong atau error pada ${c.name}`));
                            }
                        } catch (e) {
                            reject(e);
                        }
                    });
                });

                try {
                    // Balapan dimulai serentak! Jalur tercepat mengembalikan data langsung merender hasil pencarian
                    const fastestJson = await raceSuccessful(racingPromises);
                    setSearchResult(fastestJson); 
                    setCurrentPage('result'); 
                } catch (e) { 
                    console.log("Semua koneksi API gagal: ", e.message);
                    showMsg("LIMIT / SIBUK"); 
                } finally { 
                    setLoading(false); 
                }
            };

            // KUNCI UTAMA: ALGORITMA PENATAAN DATA MULTI LEVEL & SUBSTRING SEARCH (DENGAN PENYARING SOLAR YANG SANGAT DETAIL)
            const getVal = (cat) => {
                if (!searchResult) return "-";
                
                const keys = {
                    Nama: ['NamaPemilik', 'nama', 'nm_pmlk', 'nama_pemilik', 'nm_pmlk_owner', 'nm_pemilik'], 
                    NIK: ['NoKTP', 'nik', 'no_ktp', 'identitas', 'no_ktp_pemilik', 'ktp'], 
                    HP: ['NoHP', 'msisdn', 'phone', 'no_hp', 'no_telp', 'telp', 'hp'],
                    Pekerjaan: ['Pekerjaan', 'pekerjaan', 'pekerjaan_pemilik', 'pkrjn', 'job', 'pekerjaan_owner', 'pekerjaanpemilik'],
                    Alamat: ['AlamatPemilik', 'alamat', 'almt_pmlk', 'alamat_pmlk', 'alamat_owner', 'almt_pemilik'], 
                    Merk: ['Merk', 'merk', 'merek', 'make', 'brand'], 
                    Tipe: ['Type', 'type', 'tipe', 'nm_tipe', 'model', 'tipekendaraan'],
                    Tahun: ['TahunPembuatan', 'tahun', 'thn_buat', 'th_buat', 'tahun_buat', 'thn_rakit', 'tahunpembuat', 'thnbuat'], 
                    Warna: ['Warna', 'warna', 'warna_tnkb', 'warna_kendaraan', 'warnatnkb'], 
                    CC: ['IsiCylinder', 'cc', 'isi_silinder', 'cylinder', 'isi_silinder_cc', 'silinder', 'cc_mesin'],
                    Roda: ['jumlah_roda', 'roda', 'jumlahroda', 'jns_roda', 'no_roda_jumlah', 'wheels', 'jumlah_roda_kendaraan'],
                    Noka: ['NoRangka', 'noka', 'vin', 'no_rangka', 'norangka', 'no_rangka_kendaraan'], 
                    Nosin: ['NoMesin', 'nosin', 'no_mesin', 'nomesin', 'no_mesin_kendaraan'],
                    BPKB: ['NoBPKB', 'bpkb', 'no_bpkb', 'nobpkb'], 
                    STNK: ['NoSTNK', 'stnk', 'no_stnk', 'nostnk'], 
                    Tgl: ['TanggalDaftar', 'tgl_daftar', 'tgl_registrasi', 'tgl_stnk_berlaku', 'tgl_daftar_stnk', 'tgl_stnk'],
                    APM: ['atpm', 'apm', 'nama_atpm', 'nama_apm', 'pemegang_merek', 'agen_pemegang_merek', 'pabrikan', 'pabrik_pembuat', 'pabrik', 'produsen', 'pembuat', 'manufacture', 'manufactured_by', 'brand_apm', 'pt_pembuat'],
                    NopolServer: ['NoPolisi', 'nopol', 'no_pol', 'nomor_polisi', 'tnkb'], 
                    Wilayah: ['Wilayah', 'kode_wilayah', 'kd_wilayah', 'provinsi', 'wilayah'], 
                    Seri: ['Seri', 'seri_akhir', 'kd_seri', 'seri'], 
                    Pajak: ['status_pajak', 'pajak', 'info_pajak', 'pajak_status', 'tgl_pajak', 'berlaku_pajak', 'status_bayar']
                };
                const aliases = keys[cat] || [cat];
                
                // Ratakan objek bertingkat (flatten nested objects)
                const flatObj = {};
                const flatten = (obj) => {
                    if (!obj) return;
                    if (typeof obj !== 'object') return;
                    
                    for (let k in obj) {
                        if (obj[k] !== null && obj[k] !== undefined && obj[k] !== "") {
                            if (typeof obj[k] === 'object') {
                                flatten(obj[k]);
                            } else {
                                flatObj[k.toLowerCase()] = obj[k];
                            }
                        }
                    }
                };
                
                flatten(searchResult);

                // PENANGANAN KHUSUS UNTUK APM PT PEMBUAT KENDARAAN (FALLBACK CERDAS)
                if (cat === 'APM') {
                    let apiApm = "";
                    for (let a of aliases) {
                        const val = flatObj[a.toLowerCase()];
                        if (val !== undefined && val !== null && val !== "" && val !== "-") {
                            apiApm = val;
                            break;
                        }
                    }
                    if (!apiApm || apiApm === "-") {
                        const orderedKeywords = ['atpm', 'apm', 'pabrik', 'pembuat', 'produsen', 'manufactur', 'perusahaan'];
                        for (let keyword of orderedKeywords) {
                            for (let k in flatObj) {
                                if (k.includes(keyword) && flatObj[k] !== "-") {
                                    apiApm = flatObj[k];
                                    break;
                                }
                            }
                            if (apiApm) break;
                        }
                    }
                    
                    // Jika data APM kosong atau "-", lakukan deteksi pintar berdasarkan Brand (Merek)
                    if (!apiApm || apiApm === "-") {
                        let brand = "";
                        const brandAliases = keys['Merk'];
                        for (let ba of brandAliases) {
                            if (flatObj[ba.toLowerCase()]) {
                                brand = String(flatObj[ba.toLowerCase()]).toUpperCase().trim();
                                break;
                            }
                        }
                        
                        let ccVal = 0;
                        const ccAliases = keys['CC'];
                        for (let ca of ccAliases) {
                            if (flatObj[ca.toLowerCase()]) {
                                ccVal = parseFloat(String(flatObj[ca.toLowerCase()]).replace(/[^0-9.]/g, ''));
                                break;
                            }
                        }
                        const isMotorcycle = brand === 'YAMAHA' || brand === 'KAWASAKI' || brand === 'VESPA' || brand === 'PIAGGIO' || (ccVal && ccVal < 250);

                        if (brand.includes('TOYOTA')) {
                            return 'PT. TOYOTA ASTRA MOTOR';
                        } else if (brand.includes('HONDA')) {
                            return isMotorcycle ? 'PT. ASTRA HONDA MOTOR' : 'PT. HONDA PROSPECT MOTOR';
                        } else if (brand.includes('MITSUBISHI')) {
                            return 'PT. MITSUBISHI MOTORS KRAMA YUDHA';
                        } else if (brand.includes('DAIHATSU')) {
                            return 'PT. ASTRA DAIHATSU MOTOR';
                        } else if (brand.includes('SUZUKI')) {
                            return 'PT. SUZUKI INDOMOBIL SALES';
                        } else if (brand.includes('YAMAHA')) {
                            return 'PT. YAMAHA INDONESIA MOTOR MANUFACTURING';
                        } else if (brand.includes('KAWASAKI')) {
                            return 'PT. KAWASAKI MOTOR INDONESIA';
                        } else if (brand.includes('NISSAN')) {
                            return 'PT. NISSAN MOTOR INDONESIA';
                        } else if (brand.includes('WULING')) {
                            return 'PT. SGMW MOTOR INDONESIA';
                        } else if (brand.includes('MAZDA')) {
                            return 'PT. EUROKARS MOTOR INDONESIA';
                        } else if (brand.includes('ISUZU')) {
                            return 'PT. ISUZU ASTRA MOTOR INDONESIA';
                        } else if (brand.includes('HINO')) {
                            return 'PT. HINO MOTORS MANUFACTURING INDONESIA';
                        } else if (brand.includes('HYUNDAI')) {
                            return 'PT. HYUNDAI MOTOR MANUFACTURING INDONESIA';
                        } else if (brand.includes('KIA')) {
                            return 'PT. KRETA INDO ARTHA';
                        } else if (brand.includes('CHEVROLET')) {
                            return 'PT. GENERAL MOTORS INDONESIA';
                        } else if (brand.includes('BMW')) {
                            return 'PT. BMW INDONESIA';
                        } else if (brand.includes('MERCEDES')) {
                            return 'PT. MERCEDES-BENZ DISTRIBUTION INDONESIA';
                        } else if (brand.includes('VESPA') || brand.includes('PIAGGIO')) {
                            return 'PT. PIAGGIO INDONESIA';
                        }
                    } else {
                        return apiApm;
                    }
                }
                
                // Cari dengan kunci pemetaan yang disukai
                for (let a of aliases) {
                    const val = flatObj[a.toLowerCase()];
                    if (val !== undefined && val !== null && val !== "") {
                        return val;
                    }
                }

                // JALUR CADANGAN KHUSUS SUBSTRING MATCH
                if (cat === 'Roda') {
                    for (let k in flatObj) {
                        if (k.includes('roda') || k.includes('wheel')) {
                            return flatObj[k];
                        }
                    }
                }
                if (cat === 'Pekerjaan') {
                    for (let k in flatObj) {
                        if (k.includes('kerja') || k.includes('job') || k.includes('profesi') || k.includes('occupat')) {
                            return flatObj[k];
                        }
                    }
                }
                
                return "-";
            };

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text; el.setAttribute('readonly', '');
                el.style.position = 'absolute'; el.style.left = '-9999px';
                el.style.top = '0';
                document.body.appendChild(el);
                
                const isiOS = navigator.userAgent.match(/ipad|iphone/i);
                if (isiOS) {
                    const range = document.createRange();
                    range.selectNodeContents(el);
                    const selection = window.getSelection();
                    selection.removeAllRanges();
                    selection.addRange(range);
                    el.setSelectionRange(0, 999999);
                } else {
                    el.select();
                }

                try {
                    const success = document.execCommand('copy');
                    if (success) showMsg("LAPORAN DISALIN");
                    else showMsg("GAGAL MENYALIN");
                } catch (err) {
                    showMsg("ERROR COPY");
                }
                document.body.removeChild(el);
            };

            const renderStatusOverlay = () => currentPage !== 'welcome' && (
                <div className="text-right glass-panel px-3 py-1.5 rounded-xl border border-white/5 z-[60]">
                    <p className="text-[10px] font-black uppercase text-orange-500">ID: {activePin}</p>
                    <p className="text-[9px] font-black text-slate-400">EXP: {formatExpiry(userExpiry)}</p>
                </div>
            );

            const renderWelcome = () => (
                <div className="flex-1 flex flex-col items-center justify-between py-12 px-8 bg-black text-white h-full relative overflow-hidden">
                    <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[40%] bg-orange-600/20 blur-[120px] rounded-full" />
                    <div className="text-center z-10 mt-4"><p className="text-[18px] font-black uppercase tracking-tight leading-tight">SELAMAT DATANG DI APLIKASI RESMI<br/>SAMSAT CSID.PRO NASIONAL</p></div>
                    <div className="flex flex-col items-center z-10">
                        <h1 onClick={() => { setAdminTapCount(c => c + 1); if(adminTapCount === 4) setShowPinModal(true); }} className="text-[72px] font-black text-white text-glow cursor-pointer">CSID.PRO</h1>
                        <div className="h-1 w-24 bg-orange-500 rounded-full -mt-2" />
                    </div>
                    <div className="w-full flex flex-col items-center gap-6 mb-8 z-10">
                        <div className="w-full max-w-[340px] glass-panel rounded-[2.5rem] py-6 px-8 text-center border-orange-500/10">
                            <p className="text-[10px] font-black uppercase tracking-widest opacity-50 mb-2">ID PENDAFTARAN</p>
                            <p className="text-[64px] font-black text-orange-500 font-mono-custom">{registrationId}</p>
                        </div>
                        <div className="w-full space-y-4 max-w-[340px]">
                            <button onClick={handleLoginOnline} className="w-full bg-white text-black py-5 rounded-2xl font-black text-lg uppercase shadow-lg active:scale-95 flex items-center justify-center gap-3"><Icons.Shield cls="w-5 h-5" /> MASUK SISTEM</button>
                            <button onClick={() => window.open(`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent('Halo Admin mohon aktivasi ID: '+registrationId)}`)} className="w-full bg-[#108a6e] text-white py-5 rounded-2xl font-black text-lg uppercase shadow-lg active:scale-95 flex items-center justify-center gap-3">DAFTAR VIA WHATSAPP</button>
                        </div>
                    </div>
                </div>
            );

            const renderSearch = () => (
                <div className="flex-1 flex flex-col h-full bg-black">
                    <header className="px-5 py-4 flex items-center justify-between border-b border-white/5 bg-black z-50">
                        <div className="flex items-center gap-2 text-white"><div className="bg-orange-500 p-1.5 rounded-lg"><Icons.Shield cls="w-5 h-5 text-black" /></div><span className="font-black text-2xl tracking-tighter">CSID.PRO</span></div>
                        {renderStatusOverlay()}
                    </header>
                    <div className="h-9 bg-black overflow-hidden flex items-center border-y border-orange-500/20"><div className="animate-marquee px-4 text-[10px] font-black uppercase tracking-widest">{broadcast}</div></div>
                    <main className="flex-1 flex flex-col px-2 pb-4 relative overflow-hidden">
                        <div className="w-full h-24 border-2 border-orange-500/40 rounded-2xl bg-black/40 flex items-center justify-center px-6 mb-2 mt-2 shadow-[0_0_30px_rgba(249,115,22,0.1)]">
                            <input ref={inputRef} type="text" inputMode="none" value={plate} onChange={(e) => setPlate(e.target.value.toUpperCase().replace(/\s/g, ''))} placeholder="MASUKKAN NOMOR" className={`bg-transparent w-full text-center font-black uppercase placeholder:text-slate-700 placeholder:text-[12px] ${plate.length > 10 ? 'text-2xl' : 'text-4xl'} text-white`} />
                        </div>
                        <div className="flex flex-col items-center justify-center h-12"><p className="text-orange-500 text-[12px] font-black uppercase">⚠️ PERINGATAN</p><p className="text-white/60 text-[10px] font-bold text-center uppercase">DILARANG MENYALAHGUNAKAN APLIKASI<br/>TANPA IZIN RESMI CSID.PRO</p></div>
                        <div className="mt-auto">
                            <div className={`grid ${userRole === 'master' ? 'grid-cols-7' : 'grid-cols-6'} gap-1 mb-1`}>
                                <button onClick={() => setKbHeight(h => Math.max(16, h-2))} className="bg-slate-800/80 h-14 rounded-md key-press-effect flex items-center justify-center text-white"><Icons.Minus /></button>
                                <button onClick={() => setKbHeight(h => Math.min(36, h+2))} className="bg-slate-800/80 h-14 rounded-md key-press-effect flex items-center justify-center text-white"><Icons.Plus /></button>
                                <button className="bg-slate-800/80 h-14 rounded-md key-press-effect flex items-center justify-center text-white"><Icons.Camera /></button>
                                <button onClick={async () => { try { const t = await navigator.clipboard.readText(); setPlate(t.toUpperCase().replace(/\s/g, '')); } catch(e){} }} className="bg-slate-800/80 h-14 rounded-md key-press-effect flex items-center justify-center text-white"><Icons.Paste /></button>
                                {userRole === 'master' && <button onClick={() => setCurrentPage('admin')} className="bg-red-900/60 h-14 rounded-md key-press-effect flex items-center justify-center text-red-400"><Icons.Shield /></button>}
                                <button onClick={() => window.location.reload()} className="bg-red-700 h-14 rounded-md key-press-effect flex items-center justify-center text-white"><Icons.Power /></button>
                                <button onClick={fetchData} className="bg-orange-600 h-14 rounded-md key-press-effect flex items-center justify-center text-white"><Icons.Search /></button>
                            </div>
                            <div className="flex flex-col gap-1">
                                <div className="grid grid-cols-5 gap-1">{['1','2','3'].map(n => <button key={n} onClick={() => setPlate(p => p+n)} style={{height: `${kbHeight * 2.8}px`}} className="bg-slate-900 text-white rounded-md border border-white/10 text-3xl font-black key-press-effect">{n}</button>)}<button onClick={() => setPlate(p => p.slice(0,-1))} style={{height: `${kbHeight * 2.8}px`}} className="bg-slate-700 text-white rounded-md font-black text-xl key-press-effect">DEL</button><button onClick={() => setPlate('')} style={{height: `${kbHeight * 2.8}px`}} className="bg-slate-700 text-white rounded-md font-black text-xl key-press-effect">CLR</button></div>
                                <div className="grid grid-cols-4 gap-1">{['4','5','6','0'].map(n => <button key={n} onClick={() => setPlate(p => p+n)} style={{height: `${kbHeight * 2.8}px`}} className="bg-slate-900 text-white rounded-md border border-white/10 text-3xl font-black key-press-effect">{n}</button>)}</div>
                                <div className="grid grid-cols-3 gap-1">{['7','8','9'].map(n => <button key={n} onClick={() => setPlate(p => p+n)} style={{height: `${kbHeight * 2.8}px`}} className="bg-slate-900 text-white rounded-md border border-white/10 text-3xl font-black key-press-effect">{n}</button>)}</div>
                                <div className="flex flex-col gap-1 pt-1">{[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']].map((row, i) => (<div key={i} className="flex gap-1 justify-center">{row.map(char => (<button key={char} onClick={() => setPlate(p => p+char)} style={{height: `${kbHeight * 3.2}px`}} className="flex-1 bg-slate-900/70 text-white rounded-md border border-white/5 text-xl font-black key-press-effect">{char}</button>))}</div>))}</div>
                            </div>
                        </div>
                    </main>
                </div>
            );

            const renderResult = () => {
                const sWil = getVal('Wilayah').replace("-","").trim(); const sNum = getVal('NopolServer').replace("-","").trim(); const sSeri = getVal('Seri').replace("-","").trim();
                const finalPlate = (/[a-zA-Z]/.test(sNum) && sNum.length > 3) ? sNum.toUpperCase() : ((sWil + sNum + sSeri).length > 3 ? (sWil + sNum + sSeri).toUpperCase() : plate.toUpperCase().replace(/\s/g, ''));
                
                const rawTax = getVal('Pajak').toString().toUpperCase();
                let taxStatus = "MATI";
                if (rawTax.includes("HIDUP") || rawTax.includes("AKTIF") || rawTax.includes("BERLAKU") || rawTax.includes("LUNAS")) taxStatus = "HIDUP";
                else if (rawTax.includes("MATI") || rawTax.includes("TELAT") || rawTax.includes("OFF") || rawTax.includes("TUNGGAK")) taxStatus = "MATI";
                else if (!isNaN(Date.parse(rawTax))) taxStatus = Date.parse(rawTax) > Date.now() ? "HIDUP" : "MATI";

                const safeVal = (cat) => String(getVal(cat)).toUpperCase();

                // INFO BBM TELAH DIHAPUS SEPENUHNYA SESUAI INSTRUKSI BOSKU
                const reportText = `🇮🇩 SUMBER : APLIKASI CSID.PRO 

🕵 IDENTITAS PEMILIK :
----------------------------------------
NAMA : ${safeVal('Nama')}
NIK : ${safeVal('NIK')}
MSSDN : ${safeVal('HP')}
PEKERJAAN : ${safeVal('Pekerjaan')}
ALAMAT : ${safeVal('Alamat')}

🚘 DATA KENDARAAN :
----------------------------------------
NOPOL : ${finalPlate}
MEREK : ${safeVal('Merk')}
TYPE : ${safeVal('Tipe')}
TAHUN : ${safeVal('Tahun')}
WARNA : ${safeVal('Warna')}
CYLINDER : ${safeVal('CC')}
RODA : ${safeVal('Roda')}
INFO PAJAK : ${taxStatus}

📙 DOKUMEN RESMI :
----------------------------------------
NOKA : ${safeVal('Noka')}
NOSIN : ${safeVal('Nosin')}
NO. BPKB : ${safeVal('BPKB')}
NO. STNK : ${safeVal('STNK')}
TGL DAFTAR : ${safeVal('Tgl')}
APM : ${safeVal('APM')}
----------------------------------------
🔊 LINK DAFTAR APLIKASI : CSID.PRO
📞 Hub: https://wa.me/628136900872

✍ NOTE :
DATA DIAKSES UNTUK MEMVERIFIKASI KEPEMILIKAN KENDARAAN YANG SAH SESUAI TNKB YANG BERLAKU PADA KENDARAAN. MENURUT UU YANG BERLAKU ⚖️`;

                return (
                    <div className="flex-1 flex flex-col h-full bg-black">
                        <header className="px-5 py-6 flex items-center justify-between border-b border-white/5 bg-black z-10">
                            <button onClick={() => setCurrentPage('search')} className="key-press-effect p-2 bg-slate-900 rounded-xl text-white"><Icons.ChevronLeft /></button>
                            <span className="text-white font-black tracking-widest uppercase">HASIL VALIDASI</span>
                            {renderStatusOverlay()}
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 scrollbar-hide pb-32">
                            <div className="bg-[#0f0f0f] border border-orange-500/10 rounded-[2rem] p-8 font-mono-custom text-[14px] text-white/95 leading-relaxed whitespace-pre select-text shadow-2xl">{reportText}</div>
                            <div className="mt-8 space-y-4 px-2">
                                <button onClick={() => copyToClipboard(reportText)} className="w-full bg-white text-black py-6 rounded-[2.5rem] font-black text-lg uppercase shadow-xl active:scale-95">SALIN LAPORAN</button>
                                <button onClick={() => { copyToClipboard(reportText); window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(reportText)}`, '_blank'); }} className="w-full bg-emerald-600 text-white py-6 rounded-[2.5rem] font-black text-lg uppercase shadow-xl active:scale-95">BAGIKAN KE WHATSAPP</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderAdmin = () => {
                const filtered = managedPins.filter(p => p.id.includes(searchTerm));
                const activeCount = managedPins.filter(p => !p.isBlocked && (p.expiry === 'UNLIMITED' || p.expiry > Date.now())).length;
                
                return (
                    <div className="flex-1 flex flex-col h-full bg-[#050505] overflow-hidden">
                        <header className="px-5 py-6 flex items-center justify-between border-b border-white/5 bg-black z-[100]"><button onClick={() => setCurrentPage('search')} className="p-2 bg-slate-900 rounded-xl text-white"><Icons.ChevronLeft /></button><span className="text-white font-black uppercase">MASTER CONTROL</span>{renderStatusOverlay()}</header>
                        <div className="flex-1 overflow-y-auto px-4 py-6 space-y-6 pb-20 scrollbar-hide">
                            <div className="grid grid-cols-3 gap-3">
                                {[{v: managedPins.length, l: 'TOTAL PIN', c: 'blue'}, {v: activeCount, l: 'PIN AKTIF', c: 'emerald'}, {v: 'LIVE', l: 'DATABASE', c: 'orange'}].map(s => (
                                    <div key={s.l} className={`glass-panel p-4 rounded-3xl text-center border-${s.c}-500/20`}><p className="text-3xl font-black text-orange-400 font-mono-custom">{s.v}</p><p className="text-[9px] font-black text-slate-500 uppercase mt-1">{s.l}</p></div>
                                ))}
                            </div>
                            <div className="glass-panel p-6 rounded-[2rem] border-white/5"><p className="text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-widest">BROADCAST INFO</p><textarea value={broadcast} onChange={e => setBroadcast(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-xs text-white outline-none h-20 mb-4 font-mono-custom" /><button onClick={async () => { await db.doc(paths.settings + '/main').set({ text: broadcast }); showMsg("PENGUMUMAN DIPERBARUI"); }} className="w-full bg-orange-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg">UPDATE INFO</button></div>
                            <div className="flex gap-2"><input type="text" placeholder="CARI PIN..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="flex-1 bg-slate-900 border border-white/5 rounded-2xl px-5 py-4 text-xs text-white outline-none font-bold" /><button onClick={() => setShowAddPinModal(true)} className="bg-emerald-600 text-white px-6 rounded-2xl shadow-lg flex items-center justify-center"><Icons.Plus /></button></div>
                            <div className="space-y-4">{filtered.map(p => (
                                <div key={p.id} className="glass-panel p-6 rounded-[2.5rem] border-white/10">
                                    <div className="flex justify-between mb-2"><div><p className="text-4xl font-black text-orange-500 font-mono-custom">{p.id}</p><p className="text-[11px] text-slate-400 font-bold uppercase mt-1">EXP: {p.expiry === 'UNLIMITED' ? 'NO LIMIT' : new Date(p.expiry).toLocaleDateString()}</p><p className="text-[9px] text-slate-600 font-bold mt-1">HP: {p.deviceId || 'BELUM TERKUNCI'}</p></div><span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${p.isBlocked ? 'bg-red-600' : 'bg-emerald-600'}`}>{p.isBlocked ? 'BLOCKED' : 'AKTIF'}</span></div>
                                    <div className="grid grid-cols-3 gap-2 mt-6">
                                        <button onClick={() => db.doc(`${paths.pins}/${p.id}`).update({ isBlocked: !p.isBlocked })} className="bg-orange-500 text-white py-4 rounded-2xl text-[10px] font-black uppercase">STATUS</button>
                                        <button onClick={() => setDurationModal(p)} className="bg-emerald-600 text-white py-4 rounded-2xl text-[10px] font-black uppercase">DURASI</button>
                                        <button onClick={() => {
                                            setConfirmModal({
                                                message: `Reset kunci HP untuk PIN ${p.id}?`,

                                                    await db.doc(`${paths.pins}/${p.id}`).update({ deviceId: null });

                                                    setConfirmModal(null);
                                                }
                                            });
                                        }} className="bg-blue-600 text-white py-4 rounded-2xl text-[10px] font-black uppercase">RESET HP</button>

                                    <button onClick={() => {
                                        setConfirmModal({
                                            message: `Hapus PIN ${p.id} secara permanen?`,

                                                await db.doc(`${paths.pins}/${p.id}`).delete();
                                                showMsg("PIN DIHAPUS");
                                                setConfirmModal(null);
                                            }
                                        });
                                    }} className="w-full mt-3 bg-red-900/20 text-red-500 py-4 rounded-2xl text-[10px] font-black uppercase flex items-center justify-center gap-2 border border-red-500/10"><Icons.Trash /> HAPUS</button>
                                </div>

                        </div>
                        {showAddPinModal && (

                                <div className="glass-panel w-full max-w-[380px] rounded-[3rem] p-8 border-white/10 shadow-2xl flex flex-col"><p className="text-white font-black uppercase text-sm mb-6 text-center">PIN BARU</p><input type="number" value={newPinInput} onChange={e => setNewPinInput(e.target.value)} placeholder="ANGKA PIN" className="w-full bg-slate-900 border border-white/10 rounded-2xl p-4 text-white font-black text-2xl text-center mb-6" />
                                    <div className="grid grid-cols-3 gap-2 mb-6 p-1 bg-white/5 rounded-2xl">{durationOptions.map(opt => (
                                        <button key={opt.l} onClick={() => setNewPinDuration(opt.v)} className={`py-3 rounded-xl text-[9px] font-black uppercase ${newPinDuration === opt.v ? 'bg-orange-600' : 'bg-slate-800'}`}>{opt.l}</button>
                                    ))}</div>
                                    <div className="flex gap-2"><button onClick={() => setShowAddPinModal(false)} className="flex-1 py-4 bg-slate-800 rounded-2xl font-black text-[10px] uppercase">BATAL</button><button onClick={async () => { await db.doc(`${paths.pins}/${newPinInput}`).set({ expiry: newPinDuration === 'UNLIMITED' ? 'UNLIMITED' : Date.now() + newPinDuration, isBlocked: false, role: 'user', deviceId: null }); setShowAddPinModal(false); setNewPinInput(''); showMsg("PIN DITAMBAH"); }} className="flex-1 py-4 bg-emerald-600 rounded-2xl font-black text-[10px] uppercase">SIMPAN</button></div>
                                </div>
                            </div>
                        )}
                        {durationModal && (
                            <div className="absolute inset-0 bg-black/90 backdrop-blur-md z-[500] flex items-center justify-center p-6"><div className="glass-panel w-full max-w-[360px] rounded-[3rem] p-8 border-white/10 shadow-2xl flex flex-col"><p className="text-white font-black uppercase text-sm mb-6 text-center">PERPANJANG PIN {durationModal.id}</p>
                                <div className="grid grid-cols-2 gap-2 overflow-y-auto scrollbar-hide">{durationOptions.map(opt => (<button key={opt.l} onClick={async () => { let nExp = (durationModal.expiry === 'UNLIMITED' || durationModal.expiry < Date.now()) ? Date.now() : durationModal.expiry; await db.doc(`${paths.pins}/${durationModal.id}`).update({ expiry: opt.v === 'UNLIMITED' ? 'UNLIMITED' : nExp + opt.v }); setDurationModal(null); showMsg("DURASI DIPERPANJANG"); }} className="bg-slate-800 text-white py-3 rounded-xl text-[9px] font-black uppercase">TAMBAH {opt.l}</button>))}</div>
                                <button onClick={() => setDurationModal(null)} className="w-full mt-6 py-4 text-slate-500 font-black text-[10px] uppercase">BATAL</button></div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="mobile-shell bg-black">
                    {currentPage === 'welcome' && renderWelcome()}{currentPage === 'search' && renderSearch()}{currentPage === 'result' && renderResult()}{currentPage === 'admin' && renderAdmin()}
                    
                    {showPinModal && (
                        <div className="absolute inset-0 bg-black/95 backdrop-blur-2xl z-[1000] flex items-center justify-center p-6"><div className="glass-panel w-full max-w-[320px] rounded-[3.5rem] border-white/10 p-10 text-center shadow-2xl"><h3 className="text-white font-black text-[12px] uppercase mb-10 opacity-70">MASTER OVERRIDE</h3><input autoFocus type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleMasterLogin()} placeholder="PIN" className="w-full bg-black border-2 border-white/5 rounded-2xl p-6 text-center text-4xl font-black text-white outline-none mb-10 font-mono-custom" />
                            <div className="flex gap-4"><button onClick={() => setShowPinModal(false)} className="flex-1 py-5 bg-slate-900 rounded-2xl font-black text-[11px] uppercase">Batal</button><button onClick={handleMasterLogin} className="flex-1 py-5 bg-white text-black rounded-2xl font-black text-[11px] uppercase">Masuk</button></div></div></div>
                    )}
                    
                    {/* CUSTOM CONFIRM MODAL (MENYINGKIRKAN FUNGSI BROWSER CONFIRM YANG ANCEUR DI IFRAME) */}
                    {confirmModal && (
                        <div className="absolute inset-0 bg-black/80 backdrop-blur-md z-[9999] flex items-center justify-center p-6">
                            <div className="glass-panel w-full max-w-[320px] rounded-[2rem] border-white/10 p-8 text-center shadow-2xl">
                                <p className="text-white font-black text-lg mb-6 leading-relaxed">{confirmModal.message}</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setConfirmModal(null)} className="flex-1 py-4 bg-slate-800 rounded-xl font-black text-[12px] uppercase">Batal</button>
                                    <button onClick={confirmModal.onConfirm} className="flex-1 py-4 bg-orange-600 rounded-xl font-black text-[12px] uppercase">Ya, Proses</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {notification && <div className="fixed top-14 left-1/2 -translate-x-1/2 z-[9999] bg-orange-600 text-white px-10 py-5 rounded-2xl font-black text-[11px] shadow-2xl animate-bounce uppercase border-2 border-white/20 whitespace-nowrap">{notification}</div>}
                    {loading && <div className="fixed inset-0 bg-black/80 backdrop-blur-xl z-[9000] flex items-center justify-center"><div className="flex flex-col items-center"><div className="w-14 h-14 border-4 border-white/10 border-t-orange-500 rounded-full animate-spin mb-6" /><p className="text-white font-black uppercase text-[10px] tracking-[0.4em] animate-pulse">LOADING</p></div></div>}
                </div>
            );
        };

        // FIXED REACT 18 RENDER SYNTAX TO PREVENT BLANK SCREEN
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
