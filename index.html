<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CSID.PRO - Sistem Terintegrasi</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Library OCR Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <!-- Firebase SDK v10 Compat (Mencegah Crash Modul di WebView Android) -->
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

    <!-- React dan Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --brand-primary: #f97316; --bg-dark: #000000; }
        body { background-color: var(--bg-dark); margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; -webkit-tap-highlight-color: transparent; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: scrollText 20s linear infinite; }
        .key-press-effect:active { background-color: #ffffff !important; color: #000000 !important; transform: scale(0.95); transition: all 0.1s ease; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .text-glow { text-shadow: 0 0 20px rgba(249, 115, 22, 0.6); }
        .mobile-shell { width: 100%; max-width: 430px; height: 100%; max-height: 932px; background: black; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        @media (min-width: 640px) { .mobile-shell { border: 1px solid rgba(255,255,255,0.1); border-radius: 3.5rem; box-shadow: 0 0 150px rgba(0,0,0,1); } }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; -webkit-user-select: text !important; user-select: text !important; }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .camera-video { width: 100%; height: 100%; object-fit: cover; }
        .scan-guide { border: 3px solid rgba(249, 115, 22, 0.7); box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.65); }
        @media print { body { display: none !important; } }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full flex items-center justify-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MASTER_PIN = "280189"; 
        const ADMIN_WA = "628136900872";
        const APP_ID = 'csid-intelligence-pro';
        
        // DUA ALAMAT SERVER UTAMA & CADANGAN KEDUA
        const API_UTAMA_URL = "https://tnkb.deltaforce.space/?apikey=ae958b6e6869c10dddaec2283b3c824b"; 
        const API_CADANGAN_URL = "http://178.83.180.241/.h_api_tnkb.php";

        const firebaseConfig = {
            apiKey: "AIzaSyBonuHp4nd-YZKWV5IM_2HRCfJ2TQ4zJaY",
            authDomain: "gen-lang-client-0221970857.firebaseapp.com",
            projectId: "gen-lang-client-0221970857",
            storageBucket: "gen-lang-client-0221970857.firebasestorage.app",
            messagingSenderId: "483674298302",
            appId: "1:483674298302:web:8c6ccf111af4de7bbecbef"
        };

        // Inisialisasi Firebase Compat Mode
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Helper untuk merapikan plat nomor agar sesuai standard Samsat (Prefix No_Urut Suffix)
        const formatPlate = (str) => {
            if (!str) return '';
            const cleaned = str.replace(/\s+/g, '').toUpperCase();
            const match = cleaned.match(/^([A-Z]{1,2})(\d{1,4})([A-Z]{0,3})$/);
            if (match) {
                return `${match[1]} ${match[2]} ${match[3]}`.trim();
            }
            return str.toUpperCase();
        };

        const Icons = {
            Shield: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Power: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>,
            Search: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Camera: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
            Paste: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
            ChevronLeft: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><polyline points="15 18 9 12 15 6"/></svg>,
            X: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Minus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        };

        const App = () => {
            const isAlreadyLoggedIn = localStorage.getItem('csid_logged_in') === 'true';
            const savedRole = localStorage.getItem('csid_user_role') || 'user';
            const savedExpiry = localStorage.getItem('csid_user_expiry') || null;
            const savedActivePin = localStorage.getItem('csid_active_pin') || '';

            const [currentPage, setCurrentPage] = useState(isAlreadyLoggedIn ? 'search' : 'welcome');
            const [registrationId, setRegistrationId] = useState('');
            const [userRole, setUserRole] = useState(isAlreadyLoggedIn ? savedRole : 'user');
            const [userExpiry, setUserExpiry] = useState(isAlreadyLoggedIn ? savedExpiry : null);
            const [activePin, setActivePin] = useState(isAlreadyLoggedIn ? savedActivePin : '');
            const [plate, setPlate] = useState('');
            const [broadcast, setBroadcast] = useState("SELAMAT DATANG DI CSID.PRO - VEHICLE INTELLIGENCE SYSTEM v4.0");
            const [loading, setLoading] = useState(true);
            const [kbHeight, setKbHeight] = useState(25);
            const [searchResult, setSearchResult] = useState(null);
            const [notification, setNotification] = useState(null);
            const [managedPins, setManagedPins] = useState([]);
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [adminTapCount, setAdminTapCount] = useState(0);
            const [searchTerm, setSearchTerm] = useState('');
            const [durationModal, setDurationModal] = useState(null);
            const [showAddPinModal, setShowAddPinModal] = useState(false);
            const [newPinInput, setNewPinInput] = useState('');
            const [newPinDuration, setNewPinDuration] = useState(86400000); 
            const [confirmModal, setConfirmModal] = useState(null); 
            
            const [cameraActive, setCameraActive] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const inputRef = useRef(null);

            const durationOptions = [
                {l: '1 JAM', v: 3600000},
                ...Array.from({length: 31}, (_, i) => ({l: `${i+1} HARI`, v: 86400000 * (i+1)})),
                {l: 'PERMANEN', v: 'UNLIMITED'}
            ];

            const getDeviceId = () => {
                let id = localStorage.getItem('csid_device_token');
                if (!id) { id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase(); localStorage.setItem('csid_device_token', id); }
                return id;
            };

            const showMsg = (txt) => { setNotification(txt); setTimeout(() => setNotification(null), 3000); };

            useEffect(() => {
                let savedId = localStorage.getItem('csid_reg_id');
                if (!savedId) { savedId = Math.floor(100000 + Math.random() * 900000).toString(); localStorage.setItem('csid_reg_id', savedId); }
                setRegistrationId(savedId);

                const startAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                        const pinSnap = await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').doc(savedId).get();
                        if (pinSnap.exists) {
                            const data = pinSnap.data();
                            const currentDeviceId = getDeviceId();
                            if (!data.isBlocked && (data.expiry === 'UNLIMITED' || data.expiry > Date.now()) && (!data.deviceId || data.deviceId === currentDeviceId)) {
                                setUserRole(data.role || 'user'); setUserExpiry(data.expiry); setActivePin(savedId);
                                localStorage.setItem('csid_logged_in', 'true');
                                localStorage.setItem('csid_user_role', data.role || 'user');
                                localStorage.setItem('csid_user_expiry', data.expiry);
                                localStorage.setItem('csid_active_pin', savedId);
                                setCurrentPage('search');
                            } else {
                                localStorage.removeItem('csid_logged_in');
                                setCurrentPage('welcome');
                            }
                        } else {
                            setCurrentPage('welcome');
                        }
                    } catch (e) { setCurrentPage('welcome'); } finally { setLoading(false); }
                };
                startAuth();
            }, []);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    if (!user) return;
                    
                    const unsubSettings = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_settings').doc('main').onSnapshot((d) => { 
                        if (d.exists) setBroadcast(d.data().text || broadcast); 
                    });
                    
                    const unsubPins = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').onSnapshot((snap) => { 
                        const pins = [];
                        snap.forEach(doc => {
                            pins.push({ id: doc.id, ...doc.data() });
                        });
                        setManagedPins(pins); 
                    });

                    return () => { unsubSettings(); unsubPins(); };
                });
                return () => unsubscribe();
            }, []);

            const handleLoginOnline = async () => {
                setLoading(true);
                try {
                    const pinSnap = await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').doc(registrationId).get();
                    if (!pinSnap.exists) throw new Error("ID BELUM DIAKTIFKAN ADMIN");
                    const data = pinSnap.data();
                    const currentDeviceId = getDeviceId();
                    if (data.isBlocked) throw new Error("AKSES DIBLOKIR");
                    if (data.expiry !== 'UNLIMITED' && Date.now() > data.expiry) throw new Error("MASA AKTIF HABIS");
                    if (data.deviceId && data.deviceId !== currentDeviceId) throw new Error("TERDAFTAR DI HP LAIN");
                    if (!data.deviceId) {
                        await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').doc(registrationId).set({ deviceId: currentDeviceId }, { merge: true });
                    }
                    setUserRole(data.role || 'user'); setUserExpiry(data.expiry); setActivePin(registrationId);
                    localStorage.setItem('csid_logged_in', 'true');
                    setCurrentPage('search');
                } catch (e) { showMsg(e.message); } finally { setLoading(false); }
            };

            const handleMasterLogin = () => {
                if (pinInput === MASTER_PIN) {
                    setUserRole('master'); setUserExpiry('UNLIMITED'); setActivePin('MASTER');
                    localStorage.setItem('csid_logged_in', 'true');
                    setCurrentPage('search'); setShowPinModal(false); setPinInput('');
                } else { showMsg("PIN SALAH"); setPinInput(''); }
            };

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    setCameraActive(true);
                    setTimeout(() => { if (videoRef.current) videoRef.current.srcObject = stream; }, 100);
                } catch (err) { showMsg("KAMERA TIDAK DIAKSES"); }
            };

            const stopCamera = () => { if (videoRef.current && videoRef.current.srcObject) { videoRef.current.srcObject.getTracks().forEach(t => t.stop()); } setCameraActive(false); };

            const captureAndProcess = async () => {
                if (!videoRef.current || !canvasRef.current) return;
                setIsScanning(true);
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const context = canvas.getContext('2d');
                const vWidth = video.videoWidth;
                const vHeight = video.videoHeight;
                const cropWidth = Math.round(vWidth * 0.70);
                const cropHeight = Math.round(vHeight * 0.40);
                const cropX = Math.round((vWidth - cropWidth) / 2);
                const cropY = Math.round((vHeight - cropHeight) / 2);
                canvas.width = cropWidth; canvas.height = cropHeight;
                context.drawImage(video, cropX, cropY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
                try {
                    const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                    const firstLine = text.split('\n')[0].trim();
                    if (firstLine) {
                        let cleaned = firstLine.replace(/[^a-zA-Z0-9\s]/g, '').replace(/\s+/g, ' ').trim().toUpperCase();
                        let combined = cleaned.replace(/\s/g, '');
                        const nopolRegex = /^([A-Z]{1,2})(\d{1,4})([A-Z]{0,3})$/;
                        const match = combined.match(nopolRegex);
                        let finalResult = match ? (match[3] ? `${match[1]} ${match[2]} ${match[3]}` : `${match[1]} ${match[2]}`) : combined;
                        setPlate(finalResult); showMsg("TERDETEKSI: " + finalResult); stopCamera();
                    } else { showMsg("TEKS TIDAK JELAS"); }
                } catch (e) { showMsg("OCR GAGAL"); } finally { setIsScanning(false); }
            };

            const extractJson = (text) => {
                try {
                    return JSON.parse(text);
                } catch (e) {
                    const start = text.indexOf('{');
                    const end = text.lastIndexOf('}');
                    if (start !== -1 && end !== -1) {
                        try {
                            return JSON.parse(text.substring(start, end + 1));
                        } catch (err) {
                            return null;
                        }
                    }
                }
                return null;
            };

            // Pencari Data Kendaraan Rekursif Mendalam (Menjelajah semua layer data)
            const findVehicleData = (obj) => {
                if (!obj || typeof obj !== 'object') return null;
                
                // Mendeteksi data yang valid baik dari API Utama maupun API Cadangan ke-2
                if (obj.NamaPemilik || obj.NoRangka || obj.NoSTNK || obj.NoMesin || obj.Merk || obj.Nama || obj.nopol || obj.nama_pemilik || obj.no_rangka) {
                    return obj;
                }
                
                if (Array.isArray(obj)) {
                    for (let item of obj) {
                        const res = findVehicleData(item);
                        if (res) return res;
                    }
                } else {
                    for (let key in obj) {
                        if (obj.hasOwnProperty(key)) {
                            if (typeof obj[key] === 'string' && (obj[key].trim().startsWith('{') || obj[key].trim().startsWith('['))) {
                                try {
                                    const parsed = JSON.parse(obj[key]);
                                    const res = findVehicleData(parsed);
                                    if (res) return res;
                                } catch (e) {}
                            }
                            const res = findVehicleData(obj[key]);
                            if (res) return res;
                        }
                    }
                }
                return null;
            };

            const processResponseText = (text) => {
                if (!text) return null;
                let parsed = extractJson(text);
                if (!parsed) return null;
                return findVehicleData(parsed);
            };

            // PEMBARUAN UTAMA: Turbo-Racing 12-Concurrent Balancer dengan Mixed Content Bypass (DeltaForce Space + IP Cadangan)
            const fetchData = async () => {
                const rawPlate = plate.trim().toUpperCase();
                if (!rawPlate) { showMsg("MASUKKAN PLAT NOMOR"); return; }
                setLoading(true);

                // Buat variasi format input agar lolos pencarian strict server
                const formattedPlate = formatPlate(rawPlate);
                const unformattedPlate = rawPlate.replace(/\s+/g, '');
                
                const searchKeywords = Array.from(new Set([
                    formattedPlate, 
                    rawPlate, 
                    unformattedPlate
                ])).filter(k => k.length > 2);

                // Periksa Cache Lokal untuk performa instan (0ms)
                for (let kw of searchKeywords) {
                    const cacheKey = `csid_cache_${kw}`;
                    const cachedDataRaw = localStorage.getItem(cacheKey);
                    if (cachedDataRaw) {
                        const cached = JSON.parse(cachedDataRaw);
                        if (Date.now() - cached.timestamp < 300000) { 
                            setSearchResult(cached.data); 
                            setCurrentPage('result'); 
                            setLoading(false); 
                            return; 
                        }
                    }
                }

                const allUrls = [];
                // Deteksi HTTPS untuk menghindari Mixed Content block yang membuat koneksi HTTP cadangan macet di WebView
                const isHttps = window.location.protocol === 'https:';

                searchKeywords.forEach(kw => {
                    const primaryUrl = `${API_UTAMA_URL}&keyword=${encodeURIComponent(kw)}`;
                    const backupUrl = `${API_CADANGAN_URL}?q=${encodeURIComponent(kw)}`;
                    
                    // Direct requests (Direct ke backup HTTP hanya diluncurkan jika non-HTTPS)
                    allUrls.push({ url: primaryUrl, type: 'primary' });
                    if (!isHttps) {
                        allUrls.push({ url: backupUrl, type: 'backup' });
                    }

                    // Proxy requests untuk Primary (HTTPS ke HTTPS - 100% Aman)
                    allUrls.push(
                        { url: `https://corsproxy.io/?${encodeURIComponent(primaryUrl)}`, type: 'proxy' },
                        { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(primaryUrl)}`, type: 'proxy' },
                        { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(primaryUrl)}`, type: 'proxy' },
                        { url: `https://allorigins.hexschool.workers.dev/raw?url=${encodeURIComponent(primaryUrl)}`, type: 'proxy' },
                        { url: `https://api.allorigins.win/get?url=${encodeURIComponent(primaryUrl)}`, type: 'proxy' }
                    );

                    // Proxy requests untuk Backup (Sangat Krusial! Mengubah target HTTP menjadi HTTPS lewat server proxy agar aman dari WebView)
                    allUrls.push(
                        { url: `https://corsproxy.io/?${encodeURIComponent(backupUrl)}`, type: 'proxy' },
                        { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(backupUrl)}`, type: 'proxy' },
                        { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(backupUrl)}`, type: 'proxy' },
                        { url: `https://allorigins.hexschool.workers.dev/raw?url=${encodeURIComponent(backupUrl)}`, type: 'proxy' },
                        { url: `https://api.allorigins.win/get?url=${encodeURIComponent(backupUrl)}`, type: 'proxy' }
                    );
                });

                let resolved = false;
                let activeRequests = allUrls.length;
                const controllers = [];

                const cleanLoadingAndTransition = (data) => {
                    if (resolved) return;
                    resolved = true;
                    
                    // Abort / batalkan sisa request lain seketika untuk hemat RAM & baterai HP
                    controllers.forEach(ctrl => {
                        try { ctrl.abort(); } catch(e) {}
                    });

                    searchKeywords.forEach(kw => {
                        localStorage.setItem(`csid_cache_${kw}`, JSON.stringify({ data: data, timestamp: Date.now() }));
                    });

                    setSearchResult(data);
                    setCurrentPage('result');
                    setLoading(false);
                };

                const handleFailure = () => {
                    activeRequests--;
                    if (activeRequests === 0 && !resolved) {
                        setLoading(false);
                        showMsg("DATA TIDAK ADA / SERVER SIBUK");
                    }
                };

                // Jalankan perlombaan paralel Dual API (DeltaForce + API Cadangan IP)
                allUrls.forEach((targetObj) => {
                    const ctrl = new AbortController();
                    controllers.push(ctrl);
                    const id = setTimeout(() => ctrl.abort(), 9500);

                    fetch(targetObj.url, { signal: ctrl.signal })
                        .then(async (res) => {
                            clearTimeout(id);
                            if (resolved) return;
                            if (!res.ok) { handleFailure(); return; }
                            
                            const text = await res.text();
                            const parsed = processResponseText(text);
                            if (parsed && !resolved) {
                                cleanLoadingAndTransition(parsed);
                            } else {
                                handleFailure();
                            }
                        })
                        .catch(() => {
                            clearTimeout(id);
                            handleFailure();
                        });
                });
            };

            const extractField = (item, keys) => {
                if (!item) return '-';
                for (let k of keys) {
                    if (item[k] !== undefined && item[k] !== null && item[k] !== '') {
                        return String(item[k]).toUpperCase();
                    }
                }
                return '-';
            };

            // Pemetaan Kolom Fleksibel (Mendukung CamelCase, PascalCase, dan snake_case dari kedua API)
            const getVal = (cat) => {
                if (!searchResult) return "-";
                const item = searchResult;
                
                switch (cat) {
                    case 'Nama': 
                        return extractField(item, ['NamaPemilik', 'nama_pemilik', 'Nama', 'nama', 'nm_pmlk']);
                    case 'NIK': 
                        return extractField(item, ['NIK', 'NoKTP', 'nik', 'no_ktp', 'identitas', 'no_identitas']);
                    case 'HP': 
                        return extractField(item, ['NoHP', 'MSSDN', 'msisdn', 'phone', 'no_hp', 'no_telp']);
                    case 'Pekerjaan': 
                        return extractField(item, ['Pekerjaan', 'pekerjaan', 'job', 'pekerjaan_pemilik']);
                    case 'Alamat': 
                        return extractField(item, ['Alamat', 'alamat', 'alamat_pemilik']);
                    case 'NopolServer': 
                        const nServer = extractField(item, ['nopol', 'Nopol', 'no_polisi', 'plat', 'plate']);
                        if (nServer && nServer !== '-') return nServer;
                        const wilayah = item.wilayah || item.Wilayah || '';
                        const nopol = item.nopol || item.Nopol || '';
                        const seri = item.seri || item.Seri || '';
                        if (wilayah || nopol || seri) {
                            return `${wilayah} ${nopol} ${seri}`.trim().toUpperCase();
                        }

                    )}

                    {showAddPinModal && (
                        <div className="absolute inset-0 bg-black/90 backdrop-blur-2xl z-[1000] flex items-center justify-center p-6"><div className="glass-panel w-full max-w-[380px] rounded-[3rem] p-10 border-white/10 shadow-2xl flex flex-col"><p className="text-white font-black uppercase text-xs mb-6 text-center tracking-widest opacity-60">TAMBAH PIN BARU</p><input type="number" value={newPinInput} onChange={e => setNewPinInput(e.target.value)} placeholder="000000" className="w-full bg-black border border-white/5 rounded-3xl p-6 text-white font-black text-4xl text-center mb-6 font-mono-custom tracking-widest" /><div className="grid grid-cols-3 gap-2 mb-8 max-h-[160px] overflow-y-auto pr-1 scrollbar-hide border border-white/5 p-2 rounded-2xl bg-black/30">{durationOptions.map(opt => <button key={opt.l} onClick={() => setNewPinDuration(opt.v)} className={`py-4 rounded-xl text-[9px] font-black uppercase transition-all ${newPinDuration === opt.v ? 'bg-orange-600 text-white' : 'bg-slate-900 text-slate-500'}`}>{opt.l}</button>)}</div><div className="flex gap-3"><button onClick={() => setShowAddPinModal(false)} className="flex-1 py-5 bg-slate-900 rounded-2xl font-black text-[11px] uppercase">BATAL</button><button onClick={async () => { await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').doc(newPinInput).set({ expiry: newPinDuration === 'UNLIMITED' ? 'UNLIMITED' : Date.now() + newPinDuration, isBlocked: false, role: 'user', deviceId: null }); setShowAddPinModal(false); setNewPinInput(''); showMsg("PIN BERHASIL DIBUAT"); }} className="flex-1 py-5 bg-orange-600 rounded-2xl font-black text-[11px] uppercase shadow-lg shadow-orange-600/20">SIMPAN PIN</button></div></div></div>
                    )}

                    {durationModal && (
                        <div className="absolute inset-0 bg-black/90 backdrop-blur-xl z-[500] flex items-center justify-center p-6"><div className="glass-panel w-full max-w-[360px] rounded-[3rem] p-10 border-white/10 shadow-2xl flex flex-col"><p className="text-white font-black uppercase text-xs mb-8 text-center tracking-[0.2em]">PERPANJANG MASA AKTIF: {durationModal.id}</p><div className="grid grid-cols-2 gap-3 max-h-[300px] overflow-y-auto pr-2 scrollbar-hide">{durationOptions.map(opt => <button key={opt.l} onClick={async () => { let currentExp = (durationModal.expiry === 'UNLIMITED' || durationModal.expiry < Date.now()) ? Date.now() : durationModal.expiry; await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').doc(durationModal.id).update({ expiry: opt.v === 'UNLIMITED' ? 'UNLIMITED' : currentExp + opt.v }); setDurationModal(null); showMsg("MASA AKTIF DITAMBAH"); }} className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-orange-600 transition-colors">{opt.l}</button>)}</div><button onClick={() => setDurationModal(null)} className="w-full mt-8 py-4 text-slate-500 font-black text-[11px] uppercase tracking-widest">DISMISS</button></div></div>
                    )}

                    {notification && <div className="fixed top-16 left-1/2 -translate-x-1/2 z-[9999] bg-orange-600 text-white px-12 py-5 rounded-[2rem] font-black text-[11px] shadow-[0_0_40px_rgba(249, 115, 22, 0.4)] animate-bounce uppercase border-2 border-white/20 whitespace-nowrap tracking-widest">{notification}</div>}
                    {loading && <div className="fixed inset-0 bg-black/90 backdrop-blur-2xl z-[9000] flex items-center justify-center"><div className="flex flex-col items-center"><div className="w-20 h-20 border-[6px] border-white/5 border-t-orange-600 rounded-full animate-spin mb-8 shadow-lg" /><p className="text-white font-black uppercase text-[10px] tracking-[0.6em] animate-pulse text-glow">LOADING</p></div></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
