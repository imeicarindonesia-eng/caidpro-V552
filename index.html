        body {

            display: flex;

            -webkit-tap-highlight-color: transparent;

        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: scrollText 20s linear infinite; }
        
        .key-press-effect:active { 
            background-color: #ffffff !important; 
            color: #000000 !important; 
            transform: scale(0.95);
            transition: all 0.1s ease;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .text-glow { text-shadow: 0 0 20px rgba(249, 115, 22, 0.6); }

        .mobile-shell {
            width: 100%; 
            max-width: 430px; 
            height: 100%; 
            max-height: 932px;
            background: black; 
            position: relative; 
            display: flex; 
            flex-direction: column;

        @media (min-width: 640px) {

                border: 1px solid rgba(255,255,255,0.1); 
                border-radius: 3.5rem; 
                box-shadow: 0 0 150px rgba(0,0,0,1), 0 0 20px rgba(249,115,22,0.1);

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        input:focus { outline: none; }

        /* ANTI SCREEN RECORD & PRINT DIGITAL */
        @media print {
            body { display: none !important; }

<body>
    <div id="root" class="w-full h-full flex items-center justify-center"></div>

    <!-- Menjalankan Babel sebagai ES Module untuk import Firebase SDK v12.13.0 secara real-time -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

        const { useState, useEffect, useRef } = React;

        const MASTER_PIN = "280189"; 
        const ADMIN_WA = "628136900872";
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'csid-intelligence-pro';
        
        const API_UTAMA_URL = "https://tnkb.deltaforce.space/?apikey=ae958b6e6869c10dddaec2283b3c824b&keyword=BL4558SC

        const firebaseConfig = {
            apiKey: "AIzaSyBonuHp4nd-YZKWV5IM_2HRCfJ2TQ4zJaY",
            authDomain: "gen-lang-client-0221970857.firebaseapp.com",
            projectId: "gen-lang-client-0221970857",
            storageBucket: "gen-lang-client-0221970857.firebasestorage.app",
            messagingSenderId: "483674298302",
            appId: "1:483674298302:web:8c6ccf111af4de7bbecbef",
            measurementId: "G-KSVJJWZZVP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let analytics = null;
        try {
            analytics = getAnalytics(app);
        } catch (e) {
            console.warn("Analytics non-HTTPS:", e.message);
        }

        const Icons = {
            Shield: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Power: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>,
            Search: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Camera: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
            Paste: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
            ChevronLeft: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><polyline points="15 18 9 12 15 6"/></svg>,
            Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Minus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        };

        const App = () => {
            const isAlreadyLoggedIn = localStorage.getItem('csid_logged_in') === 'true';
            const savedRole = localStorage.getItem('csid_user_role') || 'user';
            const savedExpiry = localStorage.getItem('csid_user_expiry') || null;
            const savedActivePin = localStorage.getItem('csid_active_pin') || '';

            const [currentPage, setCurrentPage] = useState(isAlreadyLoggedIn ? 'search' : 'welcome');
            const [registrationId, setRegistrationId] = useState('');
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [user, setUser] = useState(null);
            const [userRole, setUserRole] = useState(isAlreadyLoggedIn ? savedRole : null);
            const [userExpiry, setUserExpiry] = useState(isAlreadyLoggedIn ? savedExpiry : null);
            const [activePin, setActivePin] = useState(isAlreadyLoggedIn ? savedActivePin : '');
            const [plate, setPlate] = useState('');
            const [kbHeight, setKbHeight] = useState(25); 
            const [broadcast, setBroadcast] = useState("SELAMAT DATANG DI CSID.PRO - VEHICLE INTELLIGENCE SYSTEM v4.0");
            const [loading, setLoading] = useState(!isAlreadyLoggedIn);
            const [searchResult, setSearchResult] = useState(null);
            const [notification, setNotification] = useState(null);
            const [managedPins, setManagedPins] = useState([]);
            const [adminTapCount, setAdminTapCount] = useState(0);
            const [searchTerm, setSearchTerm] = useState('');
            const [durationModal, setDurationModal] = useState(null);
            const [showAddPinModal, setShowAddPinModal] = useState(false);
            const [newPinInput, setNewPinInput] = useState('');
            const [newPinDuration, setNewPinDuration] = useState(86400000); 
            const [confirmModal, setConfirmModal] = useState(null); 
            const inputRef = useRef(null);

            const durationOptions = [
                {l: '1 JAM', v: 3600000},
                ...Array.from({length: 31}, (_, i) => ({l: `${i+1} HARI`, v: 86400000 * (i+1)})),
                {l: 'PERMANEN', v: 'UNLIMITED'}
            ];

            const getDeviceId = () => {
                let id = localStorage.getItem('csid_device_token');
                if (!id) {
                    id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                    localStorage.setItem('csid_device_token', id);
                }
                return id;
            };

            const showMsg = (txt) => { 
                setNotification(txt); 
                setTimeout(() => setNotification(null), 3000); 
            };

            useEffect(() => {
                let savedId = localStorage.getItem('csid_reg_id');
                if (!savedId) {
                    savedId = Math.floor(100000 + Math.random() * 900000).toString();
                    localStorage.setItem('csid_reg_id', savedId);
                }
                setRegistrationId(savedId);

                const startAuth = async () => {
                    try {
                        const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        let authenticatedUser;
                        
                        if (token) {
                            try {
                                const credential = await signInWithCustomToken(auth, token);
                                authenticatedUser = credential.user;
                            } catch (tokenErr) {
                                const credential = await signInAnonymously(auth);
                                authenticatedUser = credential.user;
                            }
                        } else {
                            const credential = await signInAnonymously(auth);
                            authenticatedUser = credential.user;
                        }
                        
                        setUser(authenticatedUser);
                        
                        const pinSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', savedId));
                        if (pinSnap.exists()) {
                            const data = pinSnap.data();
                            const currentDeviceId = getDeviceId();
                            
                            const isNotBlocked = !data.isBlocked;
                            const isNotExpired = data.expiry === 'UNLIMITED' || data.expiry > Date.now();
                            const isDeviceMatched = !data.deviceId || data.deviceId === currentDeviceId;

                            if (isNotBlocked && isNotExpired && isDeviceMatched) {
                                setUserRole(data.role || 'user');
                                setUserExpiry(data.expiry);
                                setActivePin(savedId);
                                localStorage.setItem('csid_logged_in', 'true');
                                localStorage.setItem('csid_user_role', data.role || 'user');
                                localStorage.setItem('csid_user_expiry', data.expiry);
                                localStorage.setItem('csid_active_pin', savedId);
                                setCurrentPage('search');
                            } else {
                                localStorage.removeItem('csid_logged_in');
                                setCurrentPage('welcome');
                            }
                        } else {
                            localStorage.removeItem('csid_logged_in');
                            setCurrentPage('welcome');
                        }
                    } catch (e) { 
                        if (!isAlreadyLoggedIn) setCurrentPage('welcome');
                    } finally { 
                        setLoading(false); 
                    }
                };
                startAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubSettings = onSnapshot(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_settings', 'main'), (d) => {
                    if (d.exists()) setBroadcast(d.data().text || broadcast);
                });
                const unsubPins = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins'), (snap) => {
                    const pins = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setManagedPins(pins);
                });
                return () => { unsubSettings(); unsubPins(); };
            }, [user]);

            const handleLoginOnline = async () => {
                setLoading(true);
                try {
                    const pinSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', registrationId));
                    if (!pinSnap.exists()) throw new Error("ID BELUM DIAKTIFKAN ADMIN");
                    const data = pinSnap.data();
                    const currentDeviceId = getDeviceId();
                    if (data.isBlocked) throw new Error("AKSES DIBLOKIR");
                    if (data.expiry !== 'UNLIMITED' && Date.now() > data.expiry) throw new Error("MASA AKTIF HABIS");
                    if (data.deviceId && data.deviceId !== currentDeviceId) throw new Error("TERDAFTAR DI HP LAIN");
                    if (!data.deviceId) await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', registrationId), { deviceId: currentDeviceId }, { merge: true });
                    setUserRole('user'); setUserExpiry(data.expiry); setActivePin(registrationId); 
                    localStorage.setItem('csid_logged_in', 'true');
                    localStorage.setItem('csid_user_role', 'user');
                    localStorage.setItem('csid_user_expiry', data.expiry);
                    localStorage.setItem('csid_active_pin', registrationId);
                    setCurrentPage('search');
                } catch (e) { showMsg(e.message); } finally { setLoading(false); }
            };

            const handleMasterLogin = () => {
                if (pinInput === MASTER_PIN) {
                    setUserRole('master'); setUserExpiry('UNLIMITED'); setActivePin('MASTER');
                    localStorage.setItem('csid_logged_in', 'true');
                    localStorage.setItem('csid_user_role', 'master');
                    localStorage.setItem('csid_user_expiry', 'UNLIMITED');
                    localStorage.setItem('csid_active_pin', 'MASTER');
                    setCurrentPage('search'); setShowPinModal(false); setPinInput('');
                } else { showMsg("PIN SALAH"); setPinInput(''); }
            };

            const parseRobustJSON = (textData) => {
                const clean = textData.trim();
                try { return JSON.parse(clean); } catch (e) {
                    const startArr = clean.indexOf('['); const endArr = clean.lastIndexOf(']');
                    if (startArr !== -1 && endArr !== -1) { try { return JSON.parse(clean.substring(startArr, endArr + 1)); } catch (err) {} }
                    const startObj = clean.indexOf('{'); const endObj = clean.lastIndexOf('}');
                    if (startObj !== -1 && endObj !== -1) { try { return JSON.parse(clean.substring(startObj, endObj + 1)); } catch (err) {} }
                    throw new Error("JSON Error");
                }
            };

            const unwrapResponse = (parsed) => {
                if (!parsed) return null;
                if (parsed.contents) { try { return unwrapResponse(typeof parsed.contents === 'string' ? JSON.parse(parsed.contents) : parsed.contents); } catch (e) { return parsed.contents; } }
                return Array.isArray(parsed) ? parsed[0] : parsed;
            };

            const fetchData = async () => {
                const targetPlate = plate.replace(/\s/g, '').toUpperCase();
                if (!targetPlate) { showMsg("MASUKKAN PLAT NOMOR"); return; }
                setLoading(true);
                const cacheKey = `csid_cache_${targetPlate}`;
                const cachedDataRaw = localStorage.getItem(cacheKey);
                if (cachedDataRaw) {
                    try {
                        const cached = JSON.parse(cachedDataRaw);
                        if (Date.now() - cached.timestamp < 300000) { setSearchResult(cached.data); setCurrentPage('result'); setLoading(false); return; }
                    } catch (err) {}
                }
                const urlUtama = `${API_UTAMA_URL}&q=${targetPlate}`;
                const candidates = [
                    { url: urlUtama, name: "Direct" },
                    { url: `https://api.allorigins.win/get?url=${encodeURIComponent(urlUtama)}`, name: "Proxy1" },
                    { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(urlUtama)}`, name: "Proxy2" },
                    { url: `https://corsproxy.io/?${encodeURIComponent(urlUtama)}`, name: "Proxy3" },
                    { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(urlUtama)}`, name: "Proxy4" }
                ];
                const fetchWithTimeout = (url, timeoutMs = 12000) => {
                    const controller = new AbortController();
                    const id = setTimeout(() => controller.abort(), timeoutMs);
                    return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(id));
                };
                const racingPromises = candidates.map((c) => {
                    return new Promise(async (resolve, reject) => {
                        try {
                            const res = await fetchWithTimeout(c.url);
                            const textData = await res.text();
                            const parsed = parseRobustJSON(textData);
                            if (parsed) {
                                const unwrapped = unwrapResponse(parsed);
                                if (unwrapped && (unwrapped.Nama || unwrapped.NamaPemilik || unwrapped.nm_pmlk || Object.keys(unwrapped).length > 2)) resolve(unwrapped);
                                else reject(new Error("Empty"));
                            } else reject(new Error("Fail"));
                        } catch (e) { reject(e); }
                    });
                });
                try {
                    const raceResult = await Promise.any(racingPromises);
                    localStorage.setItem(cacheKey, JSON.stringify({ data: raceResult, timestamp: Date.now() }));
                    setSearchResult(raceResult); setCurrentPage('result'); 
                } catch (e) { showMsg("DATA TIDAK ADA"); } finally { setLoading(false); }
            };

            const getVal = (cat) => {
                if (!searchResult) return "-";
                const keys = {
                    Nama: ['NamaPemilik', 'nama', 'nm_pmlk', 'nama_pemilik', 'full_name', 'owner', 'pemilik'], 
                    NIK: ['NoKTP', 'nik', 'no_ktp', 'identitas', 'ktp', 'no_identitas'], 
                    HP: ['NoHP', 'msisdn', 'phone', 'no_hp', 'no_telp', 'telp'],
                    Pekerjaan: ['Pekerjaan', 'pekerjaan', 'job', 'pkrjn', 'profesi'],
                    Alamat: ['AlamatPemilik', 'alamat', 'almt_pmlk', 'address', 'domisili'], 
                    Merk: ['Merk', 'merk', 'merek', 'make', 'brand'], 
                    Tipe: ['Type', 'type', 'tipe', 'nm_tipe', 'model'],
                    Tahun: ['TahunPembuatan', 'tahun', 'thn_buat', 'year'], 
                    Warna: ['Warna', 'warna', 'warna_tnkb', 'warna_kendaraan', 'color'], 
                    CC: ['IsiCylinder', 'cc', 'isi_silinder', 'cylinder', 'volume'],
                    BBM: ['bahan_bakar', 'bbm', 'fuel'],
                    Roda: ['jumlah_roda', 'roda', 'wheels'],
                    Noka: ['NoRangka', 'noka', 'vin'], 
                    Nosin: ['NoMesin', 'nosin', 'mesin'],
                    BPKB: ['NoBPKB', 'bpkb'], 
                    STNK: ['NoSTNK', 'stnk'], 
                    Tgl: ['TanggalDaftar', 'tgl_daftar', 'tgl_registrasi'],
                    APM: ['atpm', 'apm', 'nama_atpm', 'pabrikan'],
                    NopolServer: ['NoPolisi', 'nopol', 'no_pol', 'tnkb'], 
                    Wilayah: ['Wilayah', 'kode_wilayah', 'provinsi'], 
                    Seri: ['Seri', 'seri_akhir', 'kd_seri'], 
                    Pajak: ['status_pajak', 'pajak', 'info_pajak']
                };
                const flatObj = {};
                const flatten = (obj) => {
                    if (!obj || typeof obj !== 'object') return;
                    for (let k in obj) {
                        const val = obj[k];
                        if (val !== null && typeof val === 'object') flatten(val);
                        else flatObj[k.toLowerCase().replace(/[^a-z0-9]/g, '')] = val;
                    }
                };
                flatten(searchResult);
                const aliases = keys[cat] || [cat];
                for (let a of aliases) {
                    const cleanKey = a.toLowerCase().replace(/[^a-z0-9]/g, '');
                    const val = flatObj[cleanKey];
                    if (val !== undefined && val !== null && val !== "" && val !== "-") return String(val).toUpperCase();
                }
                return "-";
            };

            const fallbackCopyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                el.setAttribute('readonly', '');
                el.style.position = 'fixed';
                el.style.top = '10px';
                el.style.left = '10px';
                el.style.width = '10px';
                el.style.height = '10px';
                el.style.border = 'none';
                el.style.background = 'transparent';
                el.style.opacity = '0.01';
                el.style.zIndex = '99999';
                document.body.appendChild(el);
                el.focus();
                el.select();
                el.setSelectionRange(0, 99999);
                try {
                    const successful = document.execCommand('copy');
                    if (successful) showMsg("LAPORAN DISALIN");
                    else showMsg("GAGAL SALIN");
                } catch (err) { showMsg("GAGAL SALIN"); }
                document.body.removeChild(el);
            };

            const shareToWhatsApp = (text) => {
                const encodedText = encodeURIComponent(text);
                const webUrl = `https://api.whatsapp.com/send?text=${encodedText}`;
                fallbackCopyToClipboard(text);
                const a = document.createElement('a');
                a.href = webUrl;
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            const getRemainingTime = (expiry) => {
                if (!expiry) return "-";
                if (expiry === 'UNLIMITED') return "PERMANEN";
                const diff = expiry - Date.now();
                if (diff <= 0) return "EXPIRED";
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                if (days >= 1) return `${days + 1} HARI`;
                const hours = Math.floor(diff / (1000 * 60 * 60));
                if (hours >= 1) return `${hours} JAM`;
                const minutes = Math.floor(diff / (1000 * 60));
                return `${minutes} MENIT`;
            };

            const renderStatusOverlay = () => currentPage !== 'welcome' && (
                <div className="text-right glass-panel px-3 py-1.5 rounded-xl border border-white/10 z-[60]">
                    <p className="text-[10px] font-black uppercase text-orange-500">ID: {activePin}</p>
                    <p className="text-[9px] font-black text-slate-400">SISA: {getRemainingTime(userExpiry)}</p>
                </div>
            );

            const renderWelcome = () => (
                <div className="flex-1 flex flex-col items-center justify-between py-12 px-8 bg-black text-white h-full relative">
                    <div className="absolute top-[-10%] left-[-10%] w-[80%] h-[40%] bg-orange-600/10 blur-[150px] rounded-full" />
                    <div className="text-center z-10 mt-6 space-y-1.5">
                        <p className="text-[15px] font-black uppercase tracking-tight text-orange-500 leading-tight">APLIKASI</p>
                        <p className="text-[15px] font-black uppercase tracking-tight leading-tight text-white">SAMSAT CSID.PRO NASIONAL</p>
                    </div>
                    <div className="flex flex-col items-center z-10">
                        <h1 onClick={() => { setAdminTapCount(c => c + 1); if(adminTapCount === 4) setShowPinModal(true); }} className="text-[72px] font-black text-white text-glow cursor-pointer tracking-tighter">CSID.PRO</h1>
                        <div className="h-1 w-20 bg-orange-500 rounded-full -mt-2 animate-pulse" />
                    </div>
                    <div className="w-full flex flex-col items-center gap-6 mb-8 z-10">

                const safeVal = (cat) => String(getVal(cat)).toUpperCase();

----------------------------------------

🕵 IDENTITAS PEMILIK :
----------------------------------------
NAMA : ${safeVal('Nama')}
NIK : ${safeVal('NIK')}
MSSDN : ${safeVal('HP')}
PEKERJAAN : ${safeVal('Pekerjaan')}
ALAMAT : ${safeVal('Alamat')}

🚘 DATA KENDARAAN :
----------------------------------------
NOPOL : ${finalPlate}
MEREK : ${safeVal('Merk')}
TYPE : ${safeVal('Tipe')}
TAHUN : ${safeVal('Tahun')}
WARNA : ${safeVal('Warna')}
CYLINDER : ${safeVal('CC')}

📙 DOKUMEN RESMI :
----------------------------------------
NOKA : ${safeVal('Noka')}
NOSIN : ${safeVal('Nosin')}
NO. BPKB : ${safeVal('BPKB')}
NO. STNK : ${safeVal('STNK')}

📲 INSTAL APLIKASI HUBUNGI : https://wa.me/628136900872

            return (
                <div className="mobile-shell bg-black">

                    {showPinModal && ( <div className="absolute inset-0 bg-black/95 backdrop-blur-3xl z-[2000] flex items-center justify-center p-8"> <div className="glass-panel w-full max-w-[340px] rounded-[4rem] border-white/10 p-12 text-center shadow-2xl"> <h3 className="text-orange-500 font-black text-[12px] uppercase mb-10 tracking-[0.4em] opacity-80">MASTER ACCESS</h3> <input autoFocus type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleMasterLogin()} placeholder="PIN" className="w-full bg-black/50 border-2 border-orange-600/20 rounded-3xl p-6 text-center text-5xl font-black text-white outline-none mb-10 font-mono-custom tracking-tighter shadow-inner" /> <div className="flex gap-4"> <button onClick={() => setShowPinModal(false)} className="flex-1 py-5 bg-slate-900 rounded-[1.5rem] font-black text-[11px] uppercase tracking-widest text-slate-400">BATAL</button> <button onClick={handleMasterLogin} className="flex-1 py-5 bg-white text-black rounded-[1.5rem] font-black text-[11px] uppercase tracking-widest shadow-lg active:scale-95">OTORISASI</button> </div> </div> </div> )}
                    {confirmModal && ( <div className="absolute inset-0 bg-black/80 backdrop-blur-md z-[9999] flex items-center justify-center p-6"> <div className="glass-panel w-full max-w-[320px] rounded-[2.5rem] border-white/10 p-10 text-center shadow-2xl"> <p className="text-white font-black text-xl mb-8 leading-tight tracking-tight">{confirmModal.message}</p> <div className="flex gap-4"> <button onClick={() => setConfirmModal(null)} className="flex-1 py-4 bg-slate-900 rounded-2xl font-black text-[11px] uppercase tracking-widest">BATAL</button> <button onClick={confirmModal.onConfirm} className="flex-1 py-4 bg-red-600 rounded-2xl font-black text-[11px] uppercase tracking-widest text-white shadow-lg shadow-red-600/20">YA, PROSES</button> </div> </div> </div> )}
                    {notification && ( <div className="fixed top-16 left-1/2 -translate-x-1/2 z-[9999] bg-orange-600 text-white px-12 py-5 rounded-[2rem] font-black text-[11px] shadow-[0_0_40px_rgba(249,115,22,0.4)] animate-bounce uppercase border-2 border-white/20 whitespace-nowrap tracking-widest"> {notification} </div> )}
                    {loading && ( <div className="fixed inset-0 bg-black/90 backdrop-blur-2xl z-[9000] flex items-center justify-center"> <div className="flex flex-col items-center"> <div className="w-20 h-20 border-[6px] border-white/5 border-t-orange-600 rounded-full animate-spin mb-8 shadow-lg" /> <p className="text-white font-black uppercase text-[10px] tracking-[0.6em] animate-pulse">LOADING</p> </div> </div> )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
