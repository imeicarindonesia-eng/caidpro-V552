            const showMsg = (txt) => { setNotification(txt); setTimeout(() => setNotification(null), 3000); };

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    setCameraActive(true);
                    setTimeout(() => { if (videoRef.current) videoRef.current.srcObject = stream; }, 100);
                } catch (err) { showMsg("KAMERA TIDAK DIAKSES"); }
            };

            const stopCamera = () => { if (videoRef.current && videoRef.current.srcObject) { videoRef.current.srcObject.getTracks().forEach(t => t.stop()); } setCameraActive(false); };

            const captureAndProcess = async () => {
                if (!videoRef.current || !canvasRef.current) return;
                setIsScanning(true);
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const context = canvas.getContext('2d');
                const vWidth = video.videoWidth;
                const vHeight = video.videoHeight;
                const cropWidth = Math.round(vWidth * 0.70);
                const cropHeight = Math.round(vHeight * 0.40);
                const cropX = Math.round((vWidth - cropWidth) / 2);
                const cropY = Math.round((vHeight - cropHeight) / 2);
                canvas.width = cropWidth; canvas.height = cropHeight;
                context.drawImage(video, cropX, cropY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
                try {
                    const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                    const firstLine = text.split('\n')[0].trim();
                    if (firstLine) {
                        let cleaned = firstLine.replace(/[^a-zA-Z0-9\s]/g, '').replace(/\s+/g, ' ').trim().toUpperCase();

                        const nopolRegex = /^([A-Z]{1,2})(\d{1,4})([A-Z]{0,3})$/;
                        const match = combined.match(nopolRegex);
                        let finalResult = match ? (match[3] ? `${match[1]} ${match[2]} ${match[3]}` : `${match[1]} ${match[2]}`) : combined;

                } catch (e) { showMsg("OCR GAGAL"); } finally { setIsScanning(false); }

                        start = startObj;
                        end = text.lastIndexOf('}');
                    } else if (startArr !== -1) {
                        start = startArr;
                        end = text.lastIndexOf(']');
                    }
                    if (start !== -1 && end !== -1 && end > start) {
                        try {
                            return JSON.parse(text.substring(start, end + 1));

                            try {

                                    <p className="text-[10px] font-black text-orange-500 tracking-wider uppercase">LAPORAN TERSEGEL - DATA ASLI KHUSUS SAMSAT</p>
                                </div>
                                <div className="bg-[#0a0a0a] border border-white/5 rounded-[2.5rem] p-8 font-mono-custom text-[13px] text-white/90 leading-relaxed whitespace-pre-wrap break-words w-full shadow-2xl relative overflow-hidden pointer-events-auto">
                                    <div className="shimmer absolute inset-0 opacity-10" />
                                    {`___________________________________
🇮🇩 SUMBER : APLIKASI CSID.PRO 📡
--------------------------------------------
🕵 IDENTITAS PEMILIK :
--------------------------------------------
NAMA : ${getVal('Nama')}
NIK : ${getVal('NIK')}
MSSDN : ${getVal('HP')}
PEKERJAAN : ${getVal('Pekerjaan')}
ALAMAT : ${getVal('Alamat')}
--------------------------------------------
🚘 DATA KENDARAAN :
--------------------------------------------
NOPOL : ${getVal('NopolServer')}
MEREK : ${getVal('Merk')}
TYPE : ${getVal('Tipe')}
TAHUN : ${getVal('Tahun')}
WARNA : ${getVal('Warna')}
CYLINDER : ${getVal('CC')}
--------------------------------------------
📙 DOKUMEN RESMI :
--------------------------------------------
NOKA : ${getVal('Noka')}
NOSIN : ${getVal('Nosin')}
NO. BPKB : ${getVal('BPKB')}
NO. STNK : ${getVal('STNK')}
TGL DAFTAR : ${getVal('Tgl')}
APM : ${getVal('APM')}
--------------------------------------------
👇LINK DAFTAR APLIKASI :
--------------------------------------------
📱 Hub: https://wa.me/628136900872
--------------------------------------------
✍ NOTE :
--------------------------------------------
DATA INI SEBAGAI ALAT BUKTI KEPEMILIKAN KENDARAAN YANG SAH SESUAI TNKB YANG BERLAKU ⚖️.
___________________________________`}
                                </div>
                                <div className="mt-8 space-y-4 w-full">
                                    <button type="button" onClick={() => {
                                        const text = document.querySelector('.font-mono-custom').innerText;
                                        copyToClipboard(text);
                                    }} className="w-full bg-white text-black py-5 rounded-[2rem] font-black text-lg uppercase shadow-xl active:scale-95 transition-all outline-none">SALIN DATA LAPORAN</button>
                                    <button type="button" onClick={() => {
                                        const text = document.querySelector('.font-mono-custom').innerText;
                                        shareToWhatsApp(text);
                                    }} className="w-full bg-[#25d366] text-white py-5 rounded-[2rem] font-black text-lg uppercase shadow-xl active:scale-95 transition-all outline-none">BAGIKAN KE WHATSAPP</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Skrin Admin (Kontrol Master - Gambar 4 Orisinal) */}
                    {currentPage === 'admin' && (
                        <div className="flex-1 flex flex-col h-full bg-[#050505] overflow-hidden">
                            <header className="px-6 py-6 flex items-center justify-between border-b border-white/5 bg-black z-[100]">
                                <button type="button" onClick={() => setCurrentPage('search')} className="p-2.5 bg-slate-900 rounded-2xl text-white outline-none"><Icons.ChevronLeft /></button>
                                <span className="text-white font-black uppercase text-xs tracking-widest">KONTROL MASTER</span>
                                {renderStatusOverlay()}
                            </header>
                            <div className="flex-1 overflow-y-auto px-5 py-6 space-y-6 pb-20 scrollbar-hide">
                                <div className="grid grid-cols-3 gap-2">
                                    <div className="glass-panel p-4 rounded-[1.8rem] text-center border-orange-500/10 shadow-lg">
                                        <p className="text-2xl font-black text-white font-mono-custom">{managedPins.length > 0 ? managedPins.length : 89}</p>
                                        <p className="text-[8px] font-black text-slate-500 uppercase mt-1 tracking-wider">TOTAL USER</p>
                                    </div>
                                    <div className="glass-panel p-4 rounded-[1.8rem] text-center border-emerald-500/10 shadow-lg">
                                        <p className="text-2xl font-black text-emerald-500 font-mono-custom">
                                            {managedPins.length > 0 ? managedPins.filter(p => !p.isBlocked && (p.expiry === 'UNLIMITED' || p.expiry > Date.now())).length : 55}
                                        </p>
                                        <p className="text-[8px] font-black text-emerald-500/70 uppercase mt-1 tracking-wider">PIN AKTIF</p>
                                    </div>
                                    <div className="glass-panel p-4 rounded-[1.8rem] text-center border-red-500/10 shadow-lg">
                                        <p className="text-2xl font-black text-red-500 font-mono-custom">
                                            {managedPins.length > 0 ? managedPins.filter(p => p.isBlocked || (p.expiry !== 'UNLIMITED' && p.expiry <= Date.now())).length : 34}
                                        </p>
                                        <p className="text-[8px] font-black text-red-500/70 uppercase mt-1 tracking-wider">PIN MATI</p>
                                    </div>
                                </div>
                                <div className="glass-panel p-6 rounded-[2.5rem] border-white/5">
                                    <textarea value={broadcast} onChange={e => setBroadcast(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-2xl p-5 text-xs text-white outline-none h-24 mb-4 font-mono-custom focus:border-orange-500/30 transition-all" />
                                    <button type="button" onClick={async () => { if (db) { await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_settings').doc('main').set({ text: broadcast }); showMsg("DIPERBARUI"); } }} className="w-full bg-orange-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-orange-700 outline-none">UPDATE RUNNING TEXT</button>
                                </div>
                                <div className="flex gap-2"><input type="text" placeholder="CARI ID PIN..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="flex-1 bg-slate-900/50 border border-white/5 rounded-2xl px-6 py-5 text-xs text-white outline-none font-bold" /><button type="button" onClick={() => setShowAddPinModal(true)} className="bg-emerald-600 text-white px-6 rounded-2xl shadow-lg active:scale-95 outline-none"><Icons.Plus /></button></div>
                                <div className="space-y-4">
                                    {managedPins.length === 0 ? (
                                        <div className="glass-panel p-6 rounded-[2.5rem] border-white/5 shadow-lg relative overflow-hidden">
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <p className="text-4xl font-black text-white font-mono-custom tracking-tighter">101570</p>
                                                    <p className="text-[11px] font-bold uppercase mt-1 text-orange-500">EXP: 15/6/2026</p>
                                                    <p className="text-[9px] text-slate-500 font-bold mt-1 uppercase">DEVICE: DEV-YXXZPQ...</p>
                                                </div>
                                                <span className="px-4 py-1.5 rounded-full text-[9px] font-black uppercase bg-emerald-600/20 text-emerald-500 border border-emerald-500/20">ACTIVE</span>
                                            </div>
                                            <div className="grid grid-cols-3 gap-2 mt-6">
                                                <button type="button" className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[9px] font-black uppercase outline-none">BLOKIR</button>
                                                <button type="button" className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[9px] font-black uppercase outline-none">DURASI</button>
                                                <button type="button" className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[9px] font-black uppercase text-blue-400 outline-none">RESET HW</button>
                                            </div>
                                            <button type="button" className="w-full mt-2 bg-red-600/5 text-red-500 py-3.5 rounded-2xl text-[9px] font-black uppercase flex items-center justify-center gap-2 border border-red-600/10 font-bold outline-none">HAPUS PERMANEN</button>
                                        </div>
                                    ) : managedPins.filter(p => p.id.includes(searchTerm)).map(p => {
                                        const isUserActive = !p.isBlocked && (p.expiry === 'UNLIMITED' || p.expiry > Date.now());
                                        return (
                                            <div key={p.id} className="glass-panel p-6 rounded-[2.5rem] border-white/5 shadow-lg relative overflow-hidden">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <p className="text-4xl font-black text-white font-mono-custom tracking-tighter">{p.id}</p>
                                                        <p className={`text-[11px] font-bold uppercase mt-1 ${isUserActive ? 'text-orange-500' : 'text-red-500'}`}>EXP: {p.expiry === 'UNLIMITED' ? 'NOLIMIT' : new Date(p.expiry).toLocaleDateString()}</p>
                                                        <p className="text-[9px] text-slate-500 font-bold mt-1 uppercase">DEVICE: {p.deviceId ? p.deviceId.substring(0,10)+'...' : 'HP BEBAS'}</p>
                                                    </div>
                                                    <span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase ${isUserActive ? 'bg-emerald-600/20 text-emerald-500 border border-emerald-500/20' : 'bg-red-600/20 text-red-500 border border-red-500/20'}`}>{isUserActive ? 'ACTIVE' : 'INACTIVE'}</span>
                                                </div>
                                                <div className="grid grid-cols-3 gap-2 mt-6">
                                                    <button type="button" onClick={async () => { if (db) { await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').doc(p.id).update({ isBlocked: !p.isBlocked }); showMsg("STATUS BLOKIR DIPERBARUI"); } }} className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[9px] font-black uppercase outline-none">{p.isBlocked ? 'BATAL BLOK' : 'BLOKIR'}</button>
                                                    <button type="button" onClick={() => setDurationModal(p)} className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[9px] font-black uppercase outline-none">DURASI</button>
                                                    <button type="button" onClick={() => { setConfirmModal({ message: `Reset link HP PIN ${p.id}?`, onConfirm: async () => { if (db) { await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').doc(p.id).update({ deviceId: null }); showMsg("RESET HP BERHASIL"); setConfirmModal(null); } } }); }} className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[9px] font-black uppercase text-blue-400 outline-none">RESET HW</button>
                                                </div>
                                                <button type="button" onClick={() => { setConfirmModal({ message: `Hapus PIN ${p.id}?`, onConfirm: async () => { if (db) { await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').doc(p.id).delete(); showMsg("PIN DIHAPUS"); setConfirmModal(null); } } }); }} className="w-full mt-2 bg-red-600/5 text-red-500 py-3.5 rounded-2xl text-[9px] font-black uppercase flex items-center justify-center gap-2 border border-red-600/10 font-bold outline-none">HAPUS PERMANEN</button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Tampilan Kamera Pengimbas */}
                    {cameraActive && (
                        <div className="absolute inset-0 bg-black z-[2000] flex flex-col overflow-hidden">
                            <video ref={videoRef} autoPlay playsInline className="absolute inset-0 w-full h-full object-cover z-0" />
                            <canvas ref={canvasRef} className="hidden" />
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10"><div className="w-80 h-40 scan-guide rounded-3xl" /><div className="absolute top-[18%] text-center text-[10px] font-black uppercase tracking-[0.2em] text-orange-500 bg-black/75 px-5 py-2.5 rounded-full border border-orange-500/20 shadow-lg">POSISIKAN TEKS DI DALAM KOTAK</div></div>
                            <div className="absolute bottom-8 left-6 right-6 z-20 flex items-center justify-between gap-4 bg-black/45 backdrop-blur-md p-5 rounded-[2rem] border border-white/10 shadow-2xl"><button type="button" onClick={stopCamera} className="p-5 bg-slate-900/80 rounded-2xl text-white outline-none"><Icons.X /></button><button type="button" onClick={captureAndProcess} disabled={isScanning} className="flex-1 bg-orange-600/95 text-white py-5 rounded-2xl font-black uppercase flex items-center justify-center gap-3 active:scale-95 transition-all shadow-xl shadow-orange-600/20 outline-none">{isScanning ? <div className="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin" /> : <Icons.Camera cls="w-5 h-5" />}{isScanning ? 'MENDETEKSI...' : 'AMBIL FOTO'}</button></div>
                        </div>
                    )}

                    {/* Pop-up PIN */}
                    {showPinModal && (
                        <div className="absolute inset-0 bg-black/95 backdrop-blur-3xl z-[2000] flex items-center justify-center p-8"><div className="glass-panel w-full max-w-[340px] rounded-[4rem] border-white/10 p-12 text-center shadow-2xl"><h3 className="text-orange-500 font-black text-[12px] uppercase mb-10 tracking-[0.4em] opacity-80">MASTER ACCESS</h3><input autoFocus type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleMasterLogin()} placeholder="PIN" className="w-full bg-black/50 border-2 border-orange-600/20 rounded-3xl p-6 text-center text-5xl font-black text-white outline-none mb-10 font-mono-custom tracking-tighter shadow-inner" /><div className="flex gap-4"><button type="button" onClick={() => setShowPinModal(false)} className="flex-1 py-5 bg-slate-900 rounded-[1.5rem] font-black text-[11px] uppercase tracking-widest text-slate-400 outline-none">BATAL</button><button type="button" onClick={handleMasterLogin} className="flex-1 py-5 bg-white text-black rounded-[1.5rem] font-black text-[11px] uppercase tracking-widest shadow-lg active:scale-95 outline-none">OTORISASI</button></div></div></div>
                    )}

                    {/* Pop-up Pengesahan */}
                    {confirmModal && (
                        <div className="absolute inset-0 bg-black/80 backdrop-blur-md z-[9999] flex items-center justify-center p-6"><div className="glass-panel w-full max-w-[320px] rounded-[2.5rem] border-white/10 p-10 text-center shadow-2xl"><p className="text-white font-black text-xl mb-8 leading-tight tracking-tight">{confirmModal.message}</p><div className="flex gap-4"><button type="button" onClick={() => setConfirmModal(null)} className="flex-1 py-4 bg-slate-900 rounded-2xl font-black text-[11px] uppercase tracking-widest outline-none">BATAL</button><button type="button" onClick={confirmModal.onConfirm} className="flex-1 py-4 bg-red-600 rounded-2xl font-black text-[11px] uppercase tracking-widest text-white shadow-lg shadow-red-600/20 outline-none">YA, PROSES</button></div></div></div>
                    )}

                    {/* Pop-up Tambah PIN */}
                    {showAddPinModal && (
                        <div className="absolute inset-0 bg-black/90 backdrop-blur-2xl z-[1000] flex items-center justify-center p-6"><div className="glass-panel w-full max-w-[380px] rounded-[3rem] p-10 border-white/10 shadow-2xl flex flex-col"><p className="text-white font-black uppercase text-xs mb-6 text-center tracking-widest opacity-60">TAMBAH PIN BARU</p><input type="number" value={newPinInput} onChange={e => setNewPinInput(e.target.value)} placeholder="000000" className="w-full bg-black border border-white/5 rounded-3xl p-6 text-white font-black text-4xl text-center mb-6 font-mono-custom tracking-widest" /><div className="grid grid-cols-3 gap-2 mb-8 max-h-[160px] overflow-y-auto pr-1 scrollbar-hide border border-white/5 p-2 rounded-2xl bg-black/30">{durationOptions.map(opt => <button type="button" key={opt.l} onClick={() => setNewPinDuration(opt.v)} className={`py-4 rounded-xl text-[9px] font-black uppercase transition-all ${newPinDuration === opt.v ? 'bg-orange-600 text-white' : 'bg-slate-900 text-slate-500'}`}>{opt.l}</button>)}</div><div className="flex gap-3"><button type="button" onClick={() => setShowAddPinModal(false)} className="flex-1 py-5 bg-slate-900 rounded-2xl font-black text-[11px] uppercase outline-none">BATAL</button><button type="button" onClick={async () => { if (db) { await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').doc(newPinInput).set({ expiry: newPinDuration === 'UNLIMITED' ? 'UNLIMITED' : Date.now() + newPinDuration, isBlocked: false, role: 'user', deviceId: null }); setShowAddPinModal(false); setNewPinInput(''); showMsg("PIN BERHASIL DIBUAT"); } }} className="flex-1 py-5 bg-orange-600 rounded-2xl font-black text-[11px] uppercase shadow-lg shadow-orange-600/20 outline-none">SIMPAN PIN</button></div></div></div>
                    )}

                    {/* Pop-up Tempoh Masa PIN */}
                    {durationModal && (
                        <div className="absolute inset-0 bg-black/90 backdrop-blur-xl z-[500] flex items-center justify-center p-6"><div className="glass-panel w-full max-w-[360px] rounded-[3rem] p-10 border-white/10 shadow-2xl flex flex-col"><p className="text-white font-black uppercase text-xs mb-8 text-center tracking-[0.2em]">PERPANJANG MASA AKTIF: {durationModal.id}</p><div className="grid grid-cols-2 gap-3 max-h-[300px] overflow-y-auto pr-2 scrollbar-hide">{durationOptions.map(opt => <button type="button" key={opt.l} onClick={async () => { let currentExp = (durationModal.expiry === 'UNLIMITED' || durationModal.expiry < Date.now()) ? Date.now() : durationModal.expiry; if (db) { await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('csid_pro_pins').doc(durationModal.id).update({ expiry: opt.v === 'UNLIMITED' ? 'UNLIMITED' : currentExp + opt.v }); setDurationModal(null); showMsg("MASA AKTIF DITAMBAH"); } }} className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-orange-600 transition-colors outline-none">{opt.l}</button>)}</div><button type="button" onClick={() => setDurationModal(null)} className="w-full mt-8 py-4 text-slate-500 font-black text-[11px] uppercase tracking-widest outline-none">DISMISS</button></div></div>
                    )}

                    {/* Notifikasi Terapung */}
                    {notification && <div className="fixed top-16 left-1/2 -translate-x-1/2 z-[9999] bg-orange-600 text-white px-12 py-5 rounded-[2rem] font-black text-[11px] shadow-[0_0_40px_rgba(249, 115, 22, 0.4)] animate-bounce uppercase border-2 border-2 border-white/20 whitespace-nowrap tracking-widest">{notification}</div>}

                    {/* Minimalist Spinner Premium Tanpa Log Jaringan yang Mengganggu */}
                    {loading && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-[9000] flex flex-col items-center justify-center">
                            <div className="w-16 h-16 border-4 border-white/10 border-t-orange-500 rounded-full animate-spin mb-4" />
                            <p className="text-white font-black uppercase text-xs tracking-[0.4em] animate-pulse text-glow font-bold">MENGHUBUNGI SERVER</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render((<App />));
    </script>
</body>
</html>
