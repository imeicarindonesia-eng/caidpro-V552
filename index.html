<!DOCTYPE html>
<html lang="id" class="dark">
<head>

    <style>
        :root { --brand-primary: #f97316; --bg-dark: #000000; }
        body { background-color: var(--bg-dark); margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; -webkit-tap-highlight-color: transparent; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: scrollText 20s linear infinite; }
        .key-press-effect:active { background-color: #ffffff !important; color: #000000 !important; transform: scale(0.95); transition: all 0.1s ease; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .text-glow { text-shadow: 0 0 20px rgba(249, 115, 22, 0.6); }
        .mobile-shell { width: 100%; max-width: 430px; height: 100%; max-height: 932px; background: black; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        @media (min-width: 640px) { .mobile-shell { border: 1px solid rgba(255,255,255,0.1); border-radius: 3.5rem; box-shadow: 0 0 150px rgba(0,0,0,1); } }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; -webkit-user-select: text !important; user-select: text !important; }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .camera-video { width: 100%; height: 100%; object-fit: cover; }
        .scan-guide { border: 3px solid rgba(249, 115, 22, 0.7); box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.65); }
        @media print { body { display: none !important; } }

</head>
<body>
    <div id="root" class="w-full h-full flex items-center justify-center"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

        const { useState, useEffect, useRef } = React;

        const MASTER_PIN = "280189"; 
        const ADMIN_WA = "628136900872";
        const APP_ID = 'csid-intelligence-pro';
        
        // KONFIGURASI API KEY VIP TERBARU (DARI SNIPPET BOSKU)
        const API_BASE_URL = "https://tnkb.deltaforce.space/?apikey=ae958b6e6869c10dddaec2283b3c824b"; 

        const firebaseConfig = {
            apiKey: "AIzaSyBonuHp4nd-YZKWV5IM_2HRCfJ2TQ4zJaY",
            authDomain: "gen-lang-client-0221970857.firebaseapp.com",
            projectId: "gen-lang-client-0221970857",
            storageBucket: "gen-lang-client-0221970857.firebasestorage.app",
            messagingSenderId: "483674298302",
            appId: "1:483674298302:web:8c6ccf111af4de7bbecbef",
            measurementId: "G-KSVJJWZZVP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Icon Pack Kustom SVG
        const Icons = {
            Shield: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Power: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>,
            Search: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Camera: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
            Paste: ({cls}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls || "w-6 h-6"}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1-2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
            ChevronLeft: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><polyline points="15 18 9 12 15 6"/></svg>,
            Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Minus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            X: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        };

        const App = () => {
            const isAlreadyLoggedIn = localStorage.getItem('csid_logged_in') === 'true';
            const savedRole = localStorage.getItem('csid_user_role') || 'user';
            const savedExpiry = localStorage.getItem('csid_user_expiry') || null;
            const savedActivePin = localStorage.getItem('csid_active_pin') || '';

            const [currentPage, setCurrentPage] = useState(isAlreadyLoggedIn ? 'search' : 'welcome');
            const [registrationId, setRegistrationId] = useState('');
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [userRole, setUserRole] = useState(isAlreadyLoggedIn ? savedRole : 'user');
            const [userExpiry, setUserExpiry] = useState(isAlreadyLoggedIn ? savedExpiry : null);
            const [activePin, setActivePin] = useState(isAlreadyLoggedIn ? savedActivePin : '');
            const [plate, setPlate] = useState('');
            const [broadcast, setBroadcast] = useState("SELAMAT DATANG DI CSID.PRO - VEHICLE INTELLIGENCE SYSTEM v4.0");
            const [loading, setLoading] = useState(true);
            const [kbHeight, setKbHeight] = useState(25); 
            const [searchResult, setSearchResult] = useState(null);
            const [notification, setNotification] = useState(null);
            const [managedPins, setManagedPins] = useState([]);
            const [adminTapCount, setAdminTapCount] = useState(0);
            const [searchTerm, setSearchTerm] = useState('');
            const [durationModal, setDurationModal] = useState(null);
            const [showAddPinModal, setShowAddPinModal] = useState(false);
            const [newPinInput, setNewPinInput] = useState('');
            const [newPinDuration, setNewPinDuration] = useState(86400000); 
            const [confirmModal, setConfirmModal] = useState(null); 
            const [cameraActive, setCameraActive] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const inputRef = useRef(null);

            const durationOptions = [
                {l: '1 JAM', v: 3600000},
                ...Array.from({length: 31}, (_, i) => ({l: `${i+1} HARI`, v: 86400000 * (i+1)})),
                {l: 'PERMANEN', v: 'UNLIMITED'}
            ];

            const getDeviceId = () => {
                let id = localStorage.getItem('csid_device_token');
                if (!id) {
                    id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                    localStorage.setItem('csid_device_token', id);
                }
                return id;
            };

            const showMsg = (txt) => { 
                setNotification(txt); 
                setTimeout(() => setNotification(null), 3000); 
            };

            useEffect(() => {
                let savedId = localStorage.getItem('csid_reg_id');
                if (!savedId) {
                    savedId = Math.floor(100000 + Math.random() * 900000).toString();
                    localStorage.setItem('csid_reg_id', savedId);
                }
                setRegistrationId(savedId);

                const startAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                        const pinSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', savedId));
                        if (pinSnap.exists()) {
                            const data = pinSnap.data();
                            const currentDeviceId = getDeviceId();
                            if (!data.isBlocked && (data.expiry === 'UNLIMITED' || data.expiry > Date.now()) && (!data.deviceId || data.deviceId === currentDeviceId)) {
                                setUserRole(data.role || 'user');
                                setUserExpiry(data.expiry);
                                setActivePin(savedId);
                                localStorage.setItem('csid_logged_in', 'true');
                                localStorage.setItem('csid_user_role', data.role || 'user');
                                localStorage.setItem('csid_user_expiry', data.expiry);
                                localStorage.setItem('csid_active_pin', savedId);
                                setCurrentPage('search');
                            } else {
                                localStorage.removeItem('csid_logged_in');
                                setCurrentPage('welcome');
                            }
                        } else {
                            setCurrentPage('welcome');
                        }
                    } catch (e) { 
                        setCurrentPage('welcome');
                    } finally { 
                        setLoading(false); 
                    }
                };
                startAuth();
            }, []);

            useEffect(() => {
                if (!auth.currentUser) return;
                const unsubSettings = onSnapshot(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_settings', 'main'), (d) => {
                    if (d.exists()) setBroadcast(d.data().text || broadcast);
                });
                const unsubPins = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins'), (snap) => {
                    const pins = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setManagedPins(pins);
                });
                return () => { unsubSettings(); unsubPins(); };
            }, [auth.currentUser]);

            const handleLoginOnline = async () => {
                setLoading(true);
                try {
                    const pinSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', registrationId));
                    if (!pinSnap.exists()) throw new Error("ID BELUM DIAKTIFKAN ADMIN");
                    const data = pinSnap.data();
                    const currentDeviceId = getDeviceId();

                    if (data.isBlocked) throw new Error("AKSES DIBLOKIR");
                    if (data.expiry !== 'UNLIMITED' && Date.now() > data.expiry) throw new Error("MASA AKTIF HABIS");
                    if (data.deviceId && data.deviceId !== currentDeviceId) throw new Error("TERDAFTAR DI HP LAIN");

                    if (!data.deviceId) {
                        await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', registrationId), { deviceId: currentDeviceId }, { merge: true });
                    }
                    
                    setUserRole('user'); setUserExpiry(data.expiry); setActivePin(registrationId);
                    localStorage.setItem('csid_logged_in', 'true');
                    setCurrentPage('search');
                } catch (e) { showMsg(e.message); } finally { setLoading(false); }
            };

            const handleMasterLogin = () => {
                if (pinInput === MASTER_PIN) {
                    setUserRole('master'); setUserExpiry('UNLIMITED'); setActivePin('MASTER');
                    localStorage.setItem('csid_logged_in', 'true');
                    localStorage.setItem('csid_user_role', 'master');
                    localStorage.setItem('csid_active_pin', 'MASTER');
                    setCurrentPage('search'); setShowPinModal(false); setPinInput('');
                } else { showMsg("PIN SALAH"); setPinInput(''); }
            };

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    setCameraActive(true);
                    setTimeout(() => { if (videoRef.current) videoRef.current.srcObject = stream; }, 100);
                } catch (err) { showMsg("KAMERA TIDAK DIAKSES"); }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                }
                setCameraActive(false);
            };

            const captureAndProcess = async () => {
                if (!videoRef.current || !canvasRef.current) return;
                setIsScanning(true);
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const context = canvas.getContext('2d');
                const vWidth = video.videoWidth;
                const vHeight = video.videoHeight;
                const cropWidth = Math.round(vWidth * 0.70);
                const cropHeight = Math.round(vHeight * 0.40);
                const cropX = Math.round((vWidth - cropWidth) / 2);
                const cropY = Math.round((vHeight - cropHeight) / 2);
                canvas.width = cropWidth; canvas.height = cropHeight;
                context.drawImage(video, cropX, cropY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
                try {
                    const imgData = context.getImageData(0, 0, cropWidth, cropHeight);
                    const d = imgData.data;
                    for (let i = 0; i < d.length; i += 4) {
                        const gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
                        const val = gray > 128 ? 255 : 0;
                        d[i] = d[i+1] = d[i+2] = val;
                    }
                    context.putImageData(imgData, 0, 0);
                    const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                    const firstLine = text.split('\n')[0].trim();
                    if (firstLine) {
                        let combined = firstLine.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                        const match = combined.match(/^([A-Z]{1,2})(\d{1,4})([A-Z]{0,3})$/);
                        let finalResult = match ? (match[3] ? `${match[1]} ${match[2]} ${match[3]}` : `${match[1]} ${match[2]}`) : combined;
                        setPlate(finalResult); showMsg("DETECTED: " + finalResult); stopCamera();
                    } else { showMsg("TEKS TIDAK JELAS"); }
                } catch (e) { showMsg("OCR GAGAL"); } finally { setIsScanning(false); }
            };

            const extractJson = (text) => {
                if (!text) return null;
                try { return JSON.parse(text); } catch (e) {
                    const start = text.indexOf('{'), end = text.lastIndexOf('}');
                    if (start !== -1 && end !== -1) {
                        try { return JSON.parse(text.substring(start, end + 1)); } catch (err) { return null; }
                    }
                }
                return null;
            };

            const processResponseText = (text) => {
                let parsed = extractJson(text);
                if (!parsed) return null;
                if (parsed.contents && typeof parsed.contents === 'string') {
                    parsed = extractJson(parsed.contents);
                }
                if (!parsed) return null;
                let target = parsed;
                if (parsed.data) {
                    if (Array.isArray(parsed.data) && parsed.data.length > 0) {
                        target = parsed.data[0];
                    } else if (typeof parsed.data === 'object' && parsed.data !== null) {
                        target = parsed.data;
                    }
                }
                if (target && (target.NamaPemilik || target.Nama || target.NoKTP || target.NoRangka || target.nopol || target.Merk || Object.keys(target).length > 2)) {
                    return target;
                }
                return null;
            };

            // MESIN RACING CONCURRENT FETCH PARALEL UNTUK DATA BERHASIL TAMPIL SEKETIKA
            const fetchData = async () => {
                const targetPlate = plate.replace(/\s/g, '').toUpperCase();
                if (!targetPlate) { showMsg("MASUKKAN PLAT NOMOR"); return; }
                setLoading(true);

                const cacheKey = `csid_cache_${targetPlate}`;
                const cachedDataRaw = localStorage.getItem(cacheKey);
                if (cachedDataRaw) {
                    const cached = JSON.parse(cachedDataRaw);
                    if (Date.now() - cached.timestamp < 300000) { 
                        setSearchResult(cached.data); setCurrentPage('result'); setLoading(false); return; 
                    }
                }

                const url = `${API_BASE_URL}&keyword=${targetPlate}`;
                const proxyUrls = [
                    url,
                    `https://corsproxy.io/?${encodeURIComponent(url)}`,
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
                    `https://allorigins.hexschool.workers.dev/raw?url=${encodeURIComponent(url)}`,
                    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`
                ];

                const fetchWithT = (u, ms = 8500) => {
                    const ctrl = new AbortController();
                    const id = setTimeout(() => ctrl.abort(), ms);
                    return fetch(u, { signal: ctrl.signal }).finally(() => clearTimeout(id));
                };

                let hasFinished = false;
                let activeRequests = proxyUrls.length;

                const handleSuccess = (data) => {
                    if (hasFinished) return;
                    hasFinished = true;
                    localStorage.setItem(cacheKey, JSON.stringify({ data: data, timestamp: Date.now() }));
                    setSearchResult(data); 
                    setCurrentPage('result');
                    setLoading(false);
                };

                const handleFailure = () => {
                    activeRequests--;
                    if (activeRequests === 0 && !hasFinished) {
                        hasFinished = true;
                        setLoading(false);
                        showMsg("DATA TIDAK ADA / SERVER SIBUK");
                    }
                };

                // Balapan Parallel Start!
                proxyUrls.forEach((pUrl) => {
                    fetchWithT(pUrl).then(async (res) => {
                        if (hasFinished) return;
                        if (!res.ok) { handleFailure(); return; }
                        const text = await res.text();
                        const target = processResponseText(text);
                        if (target && !hasFinished) {
                            handleSuccess(target);
                        } else {
                            handleFailure();
                        }
                    }).catch(() => {
                        handleFailure();
                    });
                });
            };

            // LOGIKA PEMETAAN DATA KOLOM DELTAFORCE (SINKRON DENGAN SNIPPET ANDA)
            const getVal = (cat) => {
                if (!searchResult) return "-";
                const item = searchResult;
                
                switch (cat) {
                    case 'Nama': return item.NamaPemilik || item.Nama || '-';
                    case 'NIK': return item.NoKTP || item.NIK || item.NoIdentitas || '-';
                    case 'HP': return item.NoHP || item.MSSDN || item.msisdn || '-';
                    case 'Pekerjaan': return item.Pekerjaan || '-';
                    case 'Alamat': return item.Alamat || item.alamat || '-';
                    case 'NopolServer': 
                        const w = item.wilayah || ''; const n = item.nopol || ''; const s = item.seri || '';
                        return (w || n || s) ? `${w} ${n} ${s}`.trim().toUpperCase() : plate.toUpperCase();
                    case 'Merk': return item.Merk || item.brand || '-';
                    case 'Tipe': return item.Type || item.Tipe || '-';
                    case 'Tahun': return item.TahunPembuatan || item.Tahun || '-';
                    case 'Warna': return item.Warna || '-';
                    case 'CC': return item.IsiCylinder || item.Cylinder || item.cylinder || '-';
                    case 'Noka': return item.NoRangka || '-';
                    case 'Nosin': return item.NoMesin || '-';
                    case 'BPKB': return item.NoBPKB || '-';
                    case 'STNK': return item.NoSTNK || '-';
                    case 'Tgl': return item.TglDaftar || item.TanggalDaftar || '-';
                    case 'APM': return item.APM || item.apm || item.AgenPemegangMerek || '-';
                    default: return "-";
                }
            };

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea'); el.value = text; el.setAttribute('readonly', ''); el.style.position = 'fixed'; el.style.top = '0'; el.style.left = '0'; el.style.width = '2px'; el.style.height = '2px'; el.style.opacity = '0.01'; document.body.appendChild(el); el.focus(); el.select(); el.setSelectionRange(0, 99999);
                try { if (document.execCommand('copy')) showMsg("LAPORAN DISALIN"); } catch (err) { showMsg("GAGAL SALIN"); } document.body.removeChild(el);
            };

            const shareToWhatsApp = (text) => {
                copyToClipboard(text);
                const a = document.createElement('a'); a.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`; a.target = '_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            };

            const getRemainingTime = (e) => { if (e === 'UNLIMITED') return "PERMANEN"; const d = e - Date.now(); if (d <= 0) return "EXPIRED"; const days = Math.floor(d / 86400000); return days >= 1 ? `${days + 1} HARI` : `${Math.floor(d / 3600000)} JAM`; };

            const renderStatusOverlay = () => (
                <div className="text-right glass-panel px-3 py-1.5 rounded-xl border border-white/10 z-[60]">
                    <p className="text-[10px] font-black uppercase text-orange-500">ID: {activePin}</p>
                    <p className="text-[9px] font-black text-slate-400">SISA: {getRemainingTime(userExpiry)}</p>
                </div>
            );

            return (
                <div className="mobile-shell bg-black">
                    {currentPage === 'welcome' && (
                        <div className="flex-1 flex flex-col items-center justify-between py-12 px-8 h-full relative">
                            <div className="absolute top-[-10%] left-[-10%] w-[80%] h-[40%] bg-orange-600/10 blur-[150px] rounded-full" />
                            <div className="text-center z-10 mt-6 space-y-1.5"><p className="text-[15px] font-black uppercase tracking-tight text-orange-500 leading-tight">APLIKASI</p><p className="text-[15px] font-black uppercase tracking-tight leading-tight text-white">SAMSAT CSID.PRO NASIONAL</p></div>
                            <div className="flex flex-col items-center z-10"><h1 onClick={() => { setAdminTapCount(c => c + 1); if(adminTapCount === 4) setShowPinModal(true); }} className="text-[72px] font-black text-white text-glow cursor-pointer tracking-tighter">CSID.PRO</h1><div className="h-1 w-20 bg-orange-500 rounded-full -mt-2 animate-pulse" /></div>
                            <div className="w-full flex flex-col items-center gap-6 mb-8 z-10"><div className="w-full max-w-[340px] glass-panel rounded-[2.5rem] py-8 px-8 text-center border-orange-500/10"><p className="text-[10px] font-black uppercase tracking-[0.3em] opacity-40 mb-3">ID PENDAFTARAN</p><p className="text-[60px] font-black text-white font-mono-custom tracking-tighter">{registrationId}</p></div><div className="w-full space-y-4 max-w-[340px]"><button onClick={handleLoginOnline} className="w-full bg-white text-black py-5 rounded-2xl font-black text-lg uppercase shadow-lg active:scale-95 flex items-center justify-center gap-3"><Icons.Shield cls="w-5 h-5" /> MASUK SISTEM</button><button onClick={() => window.open(`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent('Aktivasi ID: '+registrationId)}`)} className="w-full bg-[#108a6e] text-white py-5 rounded-2xl font-black text-lg uppercase shadow-lg active:scale-95 flex items-center justify-center gap-3">DAFTAR ADMIN</button></div></div>
                        </div>
                    )}

                    {currentPage === 'search' && (
                        <div className="flex-1 flex flex-col h-full bg-black">
                            <header className="px-6 py-5 flex items-center justify-between border-b border-white/5 bg-black/80 backdrop-blur-md z-50"><div className="flex items-center gap-3 text-white"><div className="bg-orange-600 p-1.5 rounded-lg shadow-[0_0_15px_rgba(249,115,22,0.4)]"><Icons.Shield cls="w-5 h-5 text-white" /></div><span className="font-black text-2xl tracking-tighter">CSID.PRO</span></div>{renderStatusOverlay()}</header>
                            <div className="h-10 bg-black/50 overflow-hidden flex items-center border-y border-orange-500/10"><div className="animate-marquee px-4 text-[10px] font-black uppercase tracking-widest text-slate-400">{broadcast}</div></div>
                            <main className="flex-1 flex flex-col px-4 pb-6 relative overflow-hidden"><div className="w-full h-24 border-2 border-orange-600/30 rounded-3xl bg-orange-600/5 flex items-center justify-center px-8 mb-4 mt-6"><input ref={inputRef} type="text" inputMode="none" value={plate} onChange={(e) => setPlate(e.target.value.toUpperCase())} placeholder="NO. POLISI" className={`bg-transparent w-full text-center font-black uppercase placeholder:text-slate-800 ${plate.length > 10 ? 'text-2xl' : 'text-5xl'} text-white tracking-tighter`} /></div>
                                
                                <div className="w-full text-center py-2 px-4 mb-2">
                                    <p className="text-orange-500 font-black text-xs tracking-widest flex items-center justify-center gap-1">
                                        ⚠️ RESTRICTED ACCESS
                                    </p>
                                    <p className="text-[9px] font-black text-slate-400 tracking-wider mt-0.5">
                                        DILARANG KERAS MENYALAHGUNAKAN SISTEM INI
                                    </p>
                                    <p className="text-[8px] font-bold text-slate-600 tracking-wider">
                                        HAK CIPTA CSID.PRO INTELLIGENCE SECURITY
                                    </p>
                                </div>

                                <div className="mt-auto space-y-1"><div className={`grid ${userRole === 'master' ? 'grid-cols-7' : 'grid-cols-6'} gap-[2px]`}>
                                    <button onClick={() => setKbHeight(h => Math.max(15, h-2))} className="bg-slate-900 h-14 rounded-none key-press-effect flex items-center justify-center text-slate-400 border border-white/5"><Icons.Minus /></button><button onClick={() => setKbHeight(h => Math.min(35, h+2))} className="bg-slate-900 h-14 rounded-none key-press-effect flex items-center justify-center text-slate-400 border border-white/5"><Icons.Plus /></button><button onClick={startCamera} className="bg-slate-900 h-14 rounded-none key-press-effect flex items-center justify-center text-slate-400 border border-white/5"><Icons.Camera /></button><button onClick={async () => { try { const t = await navigator.clipboard.readText(); setPlate(t.toUpperCase().replace(/\s/g, '')); } catch(e){} }} className="bg-slate-900 h-14 rounded-none key-press-effect flex items-center justify-center text-slate-400 border border-white/5"><Icons.Paste /></button>{userRole === 'master' && <button onClick={() => setCurrentPage('admin')} className="bg-orange-600/20 h-14 rounded-none key-press-effect flex items-center justify-center text-orange-500 border border-white/5"><Icons.Shield /></button>}<button onClick={() => window.location.reload()} className="bg-red-600/20 h-14 rounded-none key-press-effect flex items-center justify-center text-red-500 border border-white/5"><Icons.Power /></button><button onClick={fetchData} className="bg-orange-600 h-14 rounded-none key-press-effect flex items-center justify-center text-white shadow-lg border border-white/5"><Icons.Search /></button>
                                </div><div className="flex flex-col gap-[2px]"><div className="grid grid-cols-5 gap-[2px]">{['1','2','3'].map(n => <button key={n} onClick={() => setPlate(p => p+n)} style={{height: `${kbHeight * 2.8}px`}} className="bg-slate-900/60 text-white rounded-none border border-white/5 text-4xl font-black key-press-effect font-mono-custom">{n}</button>)}<button onClick={() => setPlate(p => p.slice(0,-1))} style={{height: `${kbHeight * 2.8}px`}} className="bg-slate-800 text-white rounded-none font-black text-sm key-press-effect border border-white/5">DEL</button><button onClick={() => setPlate('')} style={{height: `${kbHeight * 2.8}px`}} className="bg-slate-800 text-white rounded-none font-black text-sm key-press-effect border border-white/5">CLR</button></div><div className="grid grid-cols-4 gap-[2px]">{['4','5','6','0'].map(n => <button key={n} onClick={() => setPlate(p => p+n)} style={{height: `${kbHeight * 2.8}px`}} className="bg-slate-900/60 text-white rounded-none border border-white/5 text-4xl font-black key-press-effect font-mono-custom">{n}</button>)}</div><div className="grid grid-cols-3 gap-[2px]">{['7','8','9'].map(n => <button key={n} onClick={() => setPlate(p => p+n)} style={{height: `${kbHeight * 2.8}px`}} className="bg-slate-900/60 text-white rounded-none border border-white/5 text-4xl font-black key-press-effect font-mono-custom">{n}</button>)}</div><div className="flex flex-col gap-[2px] pt-1">{[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']].map((row, i) => (<div key={i} className="flex gap-[2px] justify-center">{row.map(char => (<button key={char} onClick={() => setPlate(p => p+char)} style={{height: `${kbHeight * 3.2}px`}} className="flex-1 bg-slate-950 text-white rounded-none border border-white/5 text-xl font-black key-press-effect">{char}</button>))}</div>))}</div></div></div></main>
                        </div>
                    )}

                    {currentPage === 'result' && (
                        <div className="flex-1 flex flex-col h-full bg-black relative overflow-hidden">
                            <header className="px-6 py-6 flex items-center justify-between border-b border-white/5 bg-black/80 backdrop-blur-md z-40"><button onClick={() => setCurrentPage('search')} className="key-press-effect p-2.5 bg-slate-900 rounded-2xl text-white shadow-lg"><Icons.ChevronLeft /></button><span className="text-white font-black tracking-widest text-[11px] uppercase opacity-70">LAPORAN INTEGRASI</span>{renderStatusOverlay()}</header>
                            <div className="flex-1 overflow-y-auto overflow-x-hidden p-4 scrollbar-hide pb-32 w-full" style={{ WebkitOverflowScrolling: 'touch' }}>
                                <div className="mb-4 bg-orange-600/10 border border-orange-600/30 rounded-2xl px-5 py-3 flex items-center gap-3 w-full"><span className="text-orange-500 animate-pulse font-bold text-sm">🔒</span><p className="text-[10px] font-black text-orange-500 tracking-wider uppercase">LAPORAN TERSEGEL - DATA ASLI TIDAK DAPAT DIEDIT</p></div>
                                
                                <div className="bg-[#0a0a0a] border border-white/5 rounded-[2.5rem] p-8 font-mono-custom text-[13px] text-white/90 leading-relaxed whitespace-pre-wrap break-words w-full shadow-2xl shimmer pointer-events-auto">
                                    {`🇮🇩 SUMBER : APLIKASI CSID.PRO \n----------------------------------------\n🕵 IDENTITAS PEMILIK :\n----------------------------------------\nNAMA : ${getVal('Nama')}\nNIK : ${getVal('NIK')}\nMSSDN : ${getVal('HP')}\nPEKERJAAN : ${getVal('Pekerjaan')}\nALAMAT : ${getVal('Alamat')}\n\n🚘 DATA KENDARAAN :\n----------------------------------------\nNOPOL : ${getVal('NopolServer')}\nMEREK : ${getVal('Merk')}\nTYPE : ${getVal('Tipe')}\nTAHUN : ${getVal('Tahun')}\nWARNA : ${getVal('Warna')}\nCYLINDER : ${getVal('CC')}\n\n📙 DOKUMEN RESMI :\n----------------------------------------\nNOKA : ${getVal('Noka')}\nNOSIN : ${getVal('Nosin')}\nNO. BPKB : ${getVal('BPKB')}\nNO. STNK : ${getVal('STNK')}\nTGL DAFTAR : ${getVal('Tgl')}\nAPM : ${getVal('APM')}\n----------------------------------------\n📲 INSTAL APLIKASI HUBUNGI : https://wa.me/628136900872\n----------------------------------------\n✍ NOTE :\nDATA DIAKSES UNTUK MEMVERIFIKASI KEPEMILIKAN KENDARAAN YANG SAH SESUAI TNKB YANG BERLAKU PADA KENDARAAN. MENURUT UU YANG BERLAKU ⚖️`}
                                </div>
                                
                                <div className="mt-8 space-y-4 w-full"><button onClick={() => { const text = document.querySelector('.shimmer').innerText; copyToClipboard(text); }} className="w-full bg-white text-black py-5 rounded-[2rem] font-black text-lg uppercase shadow-xl active:scale-95 transition-all">SALIN DATA LAPORAN</button><button onClick={() => { const text = document.querySelector('.shimmer').innerText; shareToWhatsApp(text); }} className="w-full bg-[#25d366] text-white py-5 rounded-[2rem] font-black text-lg uppercase shadow-xl active:scale-95 transition-all">BAGIKAN KE WHATSAPP</button></div>
                            </div>
                        </div>
                    )}

                    {currentPage === 'admin' && (
                        <div className="flex-1 flex flex-col h-full bg-[#050505] overflow-hidden">
                            <header className="px-6 py-6 flex items-center justify-between border-b border-white/5 bg-black z-[100]"><button onClick={() => setCurrentPage('search')} className="p-2.5 bg-slate-900 rounded-2xl text-white"><Icons.ChevronLeft /></button><span className="text-white font-black uppercase text-xs tracking-widest">KONTROL MASTER</span>{renderStatusOverlay()}</header>
                            <div className="flex-1 overflow-y-auto px-5 py-6 space-y-6 pb-20 scrollbar-hide">
                                <div className="grid grid-cols-3 gap-2">
                                    <div className="glass-panel p-4 rounded-[1.8rem] text-center border-orange-500/10 shadow-lg"><p className="text-2xl font-black text-white font-mono-custom">{managedPins.length}</p><p className="text-[8px] font-black text-slate-500 uppercase mt-1 tracking-wider">TOTAL USER</p></div>
                                    <div className="glass-panel p-4 rounded-[1.8rem] text-center border-emerald-500/10 shadow-lg"><p className="text-2xl font-black text-emerald-500 font-mono-custom">{managedPins.filter(p => !p.isBlocked && (p.expiry === 'UNLIMITED' || p.expiry > Date.now())).length}</p><p className="text-[8px] font-black text-emerald-500/70 uppercase mt-1 tracking-wider">PIN AKTIF</p></div>
                                    <div className="glass-panel p-4 rounded-[1.8rem] text-center border-red-500/10 shadow-lg"><p className="text-2xl font-black text-red-500 font-mono-custom">{managedPins.filter(p => p.isBlocked || (p.expiry !== 'UNLIMITED' && p.expiry <= Date.now())).length}</p><p className="text-[8px] font-black text-red-500/70 uppercase mt-1 tracking-wider">PIN MATI</p></div>
                                </div>
                                <div className="glass-panel p-6 rounded-[2.5rem] border-white/5"><textarea value={broadcast} onChange={e => setBroadcast(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-2xl p-5 text-xs text-white outline-none h-24 mb-4 font-mono-custom focus:border-orange-500/30 transition-all" /><button onClick={async () => { await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_settings', 'main'), { text: broadcast }); showMsg("DIPERBARUI"); }} className="w-full bg-orange-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-orange-700">UPDATE RUNNING TEXT</button></div>
                                <div className="flex gap-2"><input type="text" placeholder="CARI ID PIN..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="flex-1 bg-slate-900/50 border border-white/5 rounded-2xl px-6 py-5 text-xs text-white outline-none font-bold" /><button onClick={() => setShowAddPinModal(true)} className="bg-emerald-600 text-white px-6 rounded-2xl shadow-lg active:scale-95"><Icons.Plus /></button></div>
                                <div className="space-y-4">{managedPins.filter(p => p.id.includes(searchTerm)).map(p => {
                                    const isUserActive = !p.isBlocked && (p.expiry === 'UNLIMITED' || p.expiry > Date.now());
                                    return (
                                        <div key={p.id} className="glass-panel p-6 rounded-[2.5rem] border-white/5 shadow-lg relative overflow-hidden">
                                            <div className="flex justify-between items-start mb-2"><div><p className="text-4xl font-black text-white font-mono-custom tracking-tighter">{p.id}</p><p className={`text-[11px] font-bold uppercase mt-1 ${isUserActive ? 'text-orange-500' : 'text-red-500'}`}>EXP: {p.expiry === 'UNLIMITED' ? 'NOLIMIT' : new Date(p.expiry).toLocaleDateString()}</p><p className="text-[9px] text-slate-500 font-bold mt-1 uppercase">DEVICE: {p.deviceId ? p.deviceId.substring(0,10)+'...' : 'HP BEBAS'}</p></div><span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase ${isUserActive ? 'bg-emerald-600/20 text-emerald-500 border border-emerald-500/20' : 'bg-red-600/20 text-red-500 border border-red-500/20'}`}>{isUserActive ? 'ACTIVE' : 'INACTIVE'}</span></div>
                                            <div className="grid grid-cols-3 gap-2 mt-6"><button onClick={() => updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', p.id), { isBlocked: !p.isBlocked })} className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[9px] font-black uppercase">BLOKIR</button><button onClick={() => setDurationModal(p)} className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[9px] font-black uppercase">DURASI</button><button onClick={() => { setConfirmModal({ message: `Reset link HP PIN ${p.id}?`, onConfirm: async () => { await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', p.id), { deviceId: null }); showMsg("RESET HP BERHASIL"); setConfirmModal(null); } }); }} className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[9px] font-black uppercase text-blue-400">RESET HW</button></div>
                                            <button onClick={() => { setConfirmModal({ message: `Hapus PIN ${p.id}?`, onConfirm: async () => { await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', p.id)); showMsg("PIN DIHAPUS"); setConfirmModal(null); } }); }} className="w-full mt-2 bg-red-600/5 text-red-500 py-3.5 rounded-2xl text-[9px] font-black uppercase flex items-center justify-center gap-2 border border-red-600/10 font-bold">HAPUS PERMANEN</button>
                                        </div>
                                    );
                                })}</div>
                            </div>
                        </div>
                    )}

                    {cameraActive && (
                        <div className="absolute inset-0 bg-black z-[2000] flex flex-col overflow-hidden">
                            <video ref={videoRef} autoPlay playsInline className="absolute inset-0 w-full h-full object-cover z-0" />
                            <canvas ref={canvasRef} className="hidden" />
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10"><div className="w-80 h-40 scan-guide rounded-3xl" /><div className="absolute top-[18%] text-center text-[10px] font-black uppercase tracking-[0.2em] text-orange-500 bg-black/75 px-5 py-2.5 rounded-full border border-orange-500/20 shadow-lg">POSISIKAN TEKS DI DALAM KOTAK</div></div>
                            <div className="absolute bottom-8 left-6 right-6 z-20 flex items-center justify-between gap-4 bg-black/45 backdrop-blur-md p-5 rounded-[2rem] border border-white/10 shadow-2xl"><button onClick={stopCamera} className="p-5 bg-slate-900/80 rounded-2xl text-white hover:bg-slate-800 transition-colors"><Icons.X /></button><button onClick={captureAndProcess} disabled={isScanning} className="flex-1 bg-orange-600/95 text-white py-5 rounded-2xl font-black uppercase flex items-center justify-center gap-3 active:scale-95 transition-all shadow-xl shadow-orange-600/20">{isScanning ? <div className="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin" /> : <Icons.Camera cls="w-5 h-5" />}{isScanning ? 'MENDETEKSI...' : 'AMBIL FOTO'}</button></div>
                        </div>
                    )}

                    {showPinModal && (
                        <div className="absolute inset-0 bg-black/95 backdrop-blur-3xl z-[2000] flex items-center justify-center p-8"><div className="glass-panel w-full max-w-[340px] rounded-[4rem] border-white/10 p-12 text-center shadow-2xl"><h3 className="text-orange-500 font-black text-[12px] uppercase mb-10 tracking-[0.4em] opacity-80">MASTER ACCESS</h3><input autoFocus type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleMasterLogin()} placeholder="PIN" className="w-full bg-black/50 border-2 border-orange-600/20 rounded-3xl p-6 text-center text-5xl font-black text-white outline-none mb-10 font-mono-custom tracking-tighter shadow-inner" /><div className="flex gap-4"><button onClick={() => setShowPinModal(false)} className="flex-1 py-5 bg-slate-900 rounded-[1.5rem] font-black text-[11px] uppercase tracking-widest text-slate-400">BATAL</button><button onClick={handleMasterLogin} className="flex-1 py-5 bg-white text-black rounded-[1.5rem] font-black text-[11px] uppercase tracking-widest shadow-lg active:scale-95">OTORISASI</button></div></div></div>
                    )}

                    {confirmModal && (
                        <div className="absolute inset-0 bg-black/80 backdrop-blur-md z-[9999] flex items-center justify-center p-6"><div className="glass-panel w-full max-w-[320px] rounded-[2.5rem] border-white/10 p-10 text-center shadow-2xl"><p className="text-white font-black text-xl mb-8 leading-tight tracking-tight">{confirmModal.message}</p><div className="flex gap-4"><button onClick={() => setConfirmModal(null)} className="flex-1 py-4 bg-slate-900 rounded-2xl font-black text-[11px] uppercase tracking-widest">BATAL</button><button onClick={confirmModal.onConfirm} className="flex-1 py-4 bg-red-600 rounded-2xl font-black text-[11px] uppercase tracking-widest text-white shadow-lg shadow-red-600/20">YA, PROSES</button></div></div></div>
                    )}

                    {showAddPinModal && (
                        <div className="absolute inset-0 bg-black/90 backdrop-blur-2xl z-[1000] flex items-center justify-center p-6"><div className="glass-panel w-full max-w-[380px] rounded-[3rem] p-10 border-white/10 shadow-2xl flex flex-col"><p className="text-white font-black uppercase text-xs mb-6 text-center tracking-widest opacity-60">TAMBAH PIN BARU</p><input type="number" value={newPinInput} onChange={e => setNewPinInput(e.target.value)} placeholder="000000" className="w-full bg-black border border-white/5 rounded-3xl p-6 text-white font-black text-4xl text-center mb-6 font-mono-custom tracking-widest" /><div className="grid grid-cols-3 gap-2 mb-8 max-h-[160px] overflow-y-auto pr-1 scrollbar-hide border border-white/5 p-2 rounded-2xl bg-black/30">{durationOptions.map(opt => <button key={opt.l} onClick={() => setNewPinDuration(opt.v)} className={`py-4 rounded-xl text-[9px] font-black uppercase transition-all ${newPinDuration === opt.v ? 'bg-orange-600 text-white' : 'bg-slate-900 text-slate-500'}`}>{opt.l}</button>)}</div><div className="flex gap-3"><button onClick={() => setShowAddPinModal(false)} className="flex-1 py-5 bg-slate-900 rounded-2xl font-black text-[11px] uppercase">BATAL</button><button onClick={async () => { await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', newPinInput), { expiry: newPinDuration === 'UNLIMITED' ? 'UNLIMITED' : Date.now() + newPinDuration, isBlocked: false, role: 'user', deviceId: null }); setShowAddPinModal(false); setNewPinInput(''); showMsg("PIN BERHASIL DIBUAT"); }} className="flex-1 py-5 bg-orange-600 rounded-2xl font-black text-[11px] uppercase shadow-lg shadow-orange-600/20">SIMPAN PIN</button></div></div></div>
                    )}

                    {durationModal && (
                        <div className="absolute inset-0 bg-black/90 backdrop-blur-xl z-[500] flex items-center justify-center p-6"><div className="glass-panel w-full max-w-[360px] rounded-[3rem] p-10 border-white/10 shadow-2xl flex flex-col"><p className="text-white font-black uppercase text-xs mb-8 text-center tracking-[0.2em]">PERPANJANG MASA AKTIF: {durationModal.id}</p><div className="grid grid-cols-2 gap-3 max-h-[300px] overflow-y-auto pr-2 scrollbar-hide">{durationOptions.map(opt => (
                            <button key={opt.l} onClick={async () => { let currentExp = (durationModal.expiry === 'UNLIMITED' || durationModal.expiry < Date.now()) ? Date.now() : durationModal.expiry; await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'csid_pro_pins', durationModal.id), { expiry: opt.v === 'UNLIMITED' ? 'UNLIMITED' : currentExp + opt.v }); setDurationModal(null); showMsg("MASA AKTIF DITAMBAH"); }} className="bg-slate-900 border border-white/5 text-white py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-orange-600 transition-colors">{opt.l}</button>
                        ))}</div><button onClick={() => setDurationModal(null)} className="w-full mt-8 py-4 text-slate-500 font-black text-[11px] uppercase tracking-widest">DISMISS</button></div></div>
                    )}

                    {notification && <div className="fixed top-16 left-1/2 -translate-x-1/2 z-[9999] bg-orange-600 text-white px-12 py-5 rounded-[2rem] font-black text-[11px] shadow-[0_0_40px_rgba(249, 115, 22, 0.4)] animate-bounce uppercase border-2 border-white/20 whitespace-nowrap tracking-widest">{notification}</div>}
                    {loading && <div className="fixed inset-0 bg-black/90 backdrop-blur-2xl z-[9000] flex items-center justify-center"><div className="flex flex-col items-center"><div className="w-20 h-20 border-[6px] border-white/5 border-t-orange-600 rounded-full animate-spin mb-8 shadow-lg" /><p className="text-white font-black uppercase text-[10px] tracking-[0.6em] animate-pulse text-glow">LOADING</p></div></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
